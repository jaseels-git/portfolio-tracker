</script>

<style>
  @import url('https://url.uk.m.mimecastprotect.com/s/s68QCyJYmFwvRNsNtvUxvbKh?domain=fonts.googleapis.com');

    --gold: #C9A84C;

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

<!-- Header -->

<div id="header">
  <div>
    <div class="h-label">My Portfolio</div>
    <div class="h-value" id="hTotalUSD">$0.00</div>
    <div class="h-aed" id="hTotalAED">د.إ 0.00</div>

<nav id="nav">
  <button class="nav-btn active" onclick="switchTab('dashboard')" id="btn-dashboard">
    <span class="nav-icon">📊</span> Dashboard
  </button>
  <button class="nav-btn" onclick="switchTab('holdings')" id="btn-holdings">
    <span class="nav-icon">📋</span> Holdings
  </button>
  <button class="nav-btn" onclick="switchTab('markets')" id="btn-markets">
    <span class="nav-icon">🗺️</span> Markets
  </button>

<!-- Main -->

<main id="main"></main>

<!-- FAB -->

<button id="fab" onclick="openModal()">+</button>

<!-- Modal -->

<div id="overlay" onclick="closeModalIfOutside(event)">
  <div id="modal">
    <div class="modal-title" id="modalTitle">Add Holding</div>
    <div class="form-grid">
      <div class="field full">
        <label>Asset Name</label>
        <input type="text" id="fName" placeholder="e.g. Emirates NBD"/>
      </div>

        <label>Ticker</label>
        <input type="text" id="fTicker" placeholder="e.g. ENBD"/>
      </div>
      <div class="field">
        <label>Shares / Units</label>
        <input type="number" id="fShares" placeholder="100" inputmode="decimal"/>
      </div>
      <div class="field full">
        <label>Market</label>
        <div class="pills" id="mktPills">
          <button class="pill active-dfm" onclick="selectMarket('DFM')">🇦🇪 DFM</button>
          <button class="pill" onclick="selectMarket('ADX')">🇦🇪 ADX</button>
          <button class="pill" onclick="selectMarket('NSE')">🇮🇳 NSE</button>
          <button class="pill" onclick="selectMarket('BSE')">🇮🇳 BSE</button>
          <button class="pill" onclick="selectMarket('International')">🌐 International</button>
          <button class="pill" onclick="selectMarket('Crypto')">₿ Crypto</button>
        </div>
      </div>
      <div class="field full">
        <label>Price Currency</label>
        <div class="pills" id="curPills">
          <button class="pill active-aed" onclick="selectCurrency('AED')">AED</button>
          <button class="pill" onclick="selectCurrency('USD')">USD</button>
          <button class="pill" onclick="selectCurrency('INR')">INR ₹</button>

        <label>Avg Cost</label>
        <input type="number" id="fCost" placeholder="0.00" inputmode="decimal"/>

        <label>Current Price</label>

      </div>

      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveHolding()">Add Holding</button>

<!-- Toast -->

<div id="toast"></div>

<!-- Install Banner (Android/desktop only) -->

<div id="install-banner">
  <div class="install-text"><strong>Add to Home Screen</strong><br/>Install for an app-like experience</div>
  <button class="install-btn" id="installBtn">Install</button>
  <button class="install-close" onclick="document.getElementById('install-banner').classList.remove('show')">✕</button>

<script>
// ── Constants ──
const AED = 3.6725;
let INR = 83.5;
const MARKETS = ['DFM','ADX','NSE','BSE','International','Crypto'];
const COLORS = { DFM:'#C9A84C', ADX:'#4CAF7D', NSE:'#E8834C', BSE:'#E84C7A', International:'#4C8ECA', Crypto:'#B04CCA' };
const FLAGS = { DFM:'🇦🇪', ADX:'🇦🇪', NSE:'🇮🇳', BSE:'🇮🇳', International:'🌐', Crypto:'₿' };
const KEY = 'uae-portfolio-v3';

// ── State ──
let holdings = [];
let currentTab = 'dashboard';
let editId = null;
let formMarket = 'DFM';
let formCurrency = 'AED';
let pieChart = null;
let editingPriceId = null;
let deferredPrompt = null;

// ── Storage ──
function load() {
  try { holdings = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch { holdings = []; }
}
function save() {
  localStorage.setItem(KEY, JSON.stringify(holdings));
}

// ── Formatting ──
const fmtUSD = n => '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtAED = n => 'د.إ ' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
const pct = n => (n>=0?'+':'')+n.toFixed(2)+'%';
const fmtINR = n => "₹" + Math.abs(n).toLocaleString("en-IN", {minimumFractionDigits:2, maximumFractionDigits:2});
const toUSD = (amount, currency) => { if (currency==="AED") return amount/AED; if (currency==="INR") return amount/INR; return amount; };

// ── Calc ──
function calc(h) {
  const costUSD = toUSD(h.avgCost * h.shares, h.currency);
  const valueUSD = toUSD(h.currentPrice * h.shares, h.currency);
  const plUSD = valueUSD - costUSD;
  const plPct = costUSD > 0 ? (plUSD / costUSD) * 100 : 0;
  return { costUSD, valueUSD, plUSD, plPct };
}

function totals() {
  const valueUSD = holdings.reduce((s,h) => s + calc(h).valueUSD, 0);
  const costUSD = holdings.reduce((s,h) => s + calc(h).costUSD, 0);
  const pl = valueUSD - costUSD;
  const plPct = costUSD > 0 ? (pl / costUSD) * 100 : 0;
  return { valueUSD, costUSD, pl, plPct };
}

// ── Header ──
function updateHeader() {
  const t = totals();
  document.getElementById('hTotalUSD').textContent = fmtUSD(t.valueUSD);
  document.getElementById('hTotalAED').textContent = fmtAED(t.valueUSD * AED);
  const plEl = document.getElementById('hPL');
  const pctEl = document.getElementById('hPct');
  const pos = t.pl >= 0;
  plEl.textContent = (pos ? '▲ ' : '▼ ') + fmtUSD(Math.abs(t.pl));
  plEl.className = 'h-pl ' + (pos ? 'pos' : 'neg');
  pctEl.textContent = pct(t.plPct) + ' overall';
  pctEl.className = 'h-pct ' + (pos ? 'pos' : 'neg');
}

// ── Tabs ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + tab).classList.add('active');
  render();
}

// ── Render ──
function render() {
  updateHeader();
  const main = document.getElementById('main');
  if (currentTab === 'dashboard') main.innerHTML = renderDashboard();
  else if (currentTab === 'holdings') main.innerHTML = renderHoldings();
  else main.innerHTML = renderMarkets();
  bindEvents();
  if (currentTab === 'dashboard') drawPie();
}

// ── Dashboard ──
function renderDashboard() {
  const t = totals();
  const byMarket = MARKETS.map(m => ({
    name: m,
    value: holdings.filter(h=>h.market===m).reduce((s,h)=>s+calc(h).valueUSD,0)
  })).filter(m=>m.value>0);

  const legendRows = byMarket.map(m => `
    <div class="legend-row">
      <div class="legend-left">
        <div class="legend-dot" style="background:${COLORS[m.name]}"></div>
        <span class="legend-name">${FLAGS[m.name]} ${m.name}</span>
      </div>
      <div>
        <div class="legend-pct">${t.valueUSD>0?((m.value/t.valueUSD)*100).toFixed(1)+'%':'0%'}</div>
        <div class="legend-val">${fmtUSD(m.value)}</div>
      </div>
    </div>`).join('');

  const top5 = [...holdings].sort((a,b)=>calc(b).valueUSD-calc(a).valueUSD).slice(0,5);
  const topRows = top5.map(h => {
    const {valueUSD,plPct} = calc(h);
    return `<div class="top-row">
      <div class="top-left">
        <div class="mkt-dot" style="background:${COLORS[h.market]}"></div>
        <div>
          <div class="top-name">${h.ticker||h.name}</div>
          <div class="top-mkt">${h.market}</div>
        </div>
      </div>
      <div>
        <div class="top-val">${fmtUSD(valueUSD)}</div>
        <div class="top-pct ${plPct>=0?'pos':'neg'}">${pct(plPct)}</div>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="section">
      <div class="section-title" style="color:var(--gold)">Allocation by Market</div>
      ${byMarket.length===0 ? emptyState('Add your first holding') : `
        <div id="chartWrap">
          <canvas id="pieCanvas" width="150" height="150"></canvas>
          <div id="legend">${legendRows}</div>
        </div>`}
    </div>
    <div class="section">
      <div class="section-title" style="color:var(--gold)">Top Holdings</div>
      ${top5.length===0 ? emptyState('No holdings yet') : topRows}
    </div>`;
}

function drawPie() {
  const canvas = document.getElementById('pieCanvas');
  if (!canvas) return;
  if (pieChart) { pieChart.destroy(); pieChart = null; }
  const byMarket = MARKETS.map(m => ({
    name: m,
    value: holdings.filter(h=>h.market===m).reduce((s,h)=>s+calc(h).valueUSD,0)
  })).filter(m=>m.value>0);
  if (byMarket.length === 0) return;
  pieChart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: byMarket.map(m=>m.name),
      datasets: [{ data: byMarket.map(m=>m.value), backgroundColor: byMarket.map(m=>COLORS[m.name]), borderWidth: 2, borderColor: '#0D0D1A', hoverOffset: 4 }]
    },
    options: {
      cutout: '62%', plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => ' ' + fmtUSD(ctx.raw) },
        backgroundColor: '#1A1A35', titleColor: '#C9A84C', bodyColor: '#fff',
        borderColor: '#333', borderWidth: 1, cornerRadius: 10,
      }},
      animation: { animateRotate: true, duration: 600 }
    }
  });
}

// ── Holdings ──
function renderHoldings() {
  if (holdings.length === 0) return `<div class="section"><div class="section-title" style="color:var(--gold)">Holdings</div>${emptyState('Tap "+" to add your first holding')}</div>`;
  return holdings.map(h => {
    const {valueUSD,plUSD,plPct} = calc(h);
    const pos = plPct >= 0;
    const isEditingPrice = editingPriceId === h.id;
    const cur = h.currency === 'AED' ? 'د.إ' : h.currency === 'INR' ? '₹' : '$';
    return `
      <div class="card">
        <div class="card-top">
          <div class="mkt-badge" style="border-color:${COLORS[h.market]};color:${COLORS[h.market]}">${FLAGS[h.market]} ${h.market}</div>
          <div class="card-actions">
            <button class="icon-btn" onclick="editHolding('${h.id}')">✏️</button>
            <button class="icon-btn" onclick="deleteHolding('${h.id}')">🗑️</button>
          </div>
        </div>
        <div class="card-mid">
          <div>
            <div class="holding-name">${h.name}</div>
            <div class="holding-sub">${h.ticker} · ${h.shares} units</div>
          </div>
          <div>
            <div class="holding-val">${fmtUSD(valueUSD)}</div>
            <div class="holding-aed">${fmtAED(valueUSD*AED)}</div>
          </div>
        </div>
        <div class="card-stats">
          <div class="stat"><div class="stat-label">Avg Cost</div><div class="stat-val">${cur}${h.avgCost}</div></div>
          <div class="stat"><div class="stat-label">P&amp;L</div><div class="stat-val ${pos?'pos':'neg'}">${pos?'▲':'▼'} ${fmtUSD(Math.abs(plUSD))}</div></div>
          <div class="stat"><div class="stat-label">Return</div><div class="stat-val ${pos?'pos':'neg'}">${pct(plPct)}</div></div>
        </div>
        <div class="price-row" id="pr-${h.id}">
          ${isEditingPrice
            ? `<input class="price-input" id="pi-${h.id}" type="number" value="${h.currentPrice}" inputmode="decimal"/>
               <button class="price-confirm" onclick="confirmPrice('${h.id}')">✓</button>
               <button class="price-cancel" onclick="cancelPrice()">✕</button>`
            : `<button class="update-btn" onclick="startEditPrice('${h.id}','${h.currentPrice}')">🔄 Update Price (${cur}${h.currentPrice})</button>`
          }
        </div>
      </div>`;
  }).join('');
}

// ── Markets ──
function renderMarkets() {
  const t = totals();
  let html = '';
  MARKETS.forEach(market => {
    const mh = holdings.filter(h=>h.market===market);
    if (!mh.length) return;
    const mVal = mh.reduce((s,h)=>s+calc(h).valueUSD,0);
    const mPL = mh.reduce((s,h)=>s+calc(h).plUSD,0);
    const mPct = t.valueUSD>0?(mVal/t.valueUSD)*100:0;
    const pos = mPL>=0;
    html += `
      <div class="section">
        <div class="section-title" style="color:${COLORS[market]}">${FLAGS[market]} ${market}</div>
        <div class="mkt-summary">
          <div>
            <div class="mkt-val">${fmtUSD(mVal)}</div>
            <div class="mkt-aed">${fmtAED(mVal*AED)}</div>
          </div>
          <div style="text-align:right">
            <div style="color:${pos?'var(--green)':'var(--red)'};font-size:14px;font-weight:700">${pos?'▲':'▼'} ${fmtUSD(Math.abs(mPL))}</div>
            <div style="color:var(--dim);font-size:12px">${mPct.toFixed(1)}% of portfolio</div>
          </div>
        </div>
        ${mh.map(h=>{
          const {valueUSD,plPct}=calc(h);
          return `<div class="mkt-row">
            <div>
              <div style="color:var(--text);font-size:14px">${h.name}</div>
              <div style="color:var(--dim);font-size:11px">${h.ticker} · ${h.shares} units</div>
            </div>
            <div style="text-align:right">
              <div style="color:#ddd;font-size:13px">${fmtUSD(valueUSD)}</div>
              <div style="font-size:12px" class="${plPct>=0?'pos':'neg'}">${pct(plPct)}</div>
            </div>
          </div>`;
        }).join('')}
      </div>`;
  });
  if (!html) html = `<div class="section"><div class="section-title" style="color:var(--gold)">Markets</div>${emptyState('No holdings yet')}</div>`;
  return html;
}

function emptyState(msg) {
  return `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">${msg}</div></div>`;
}

// ── Modal ──
function openModal(id=null) {
  editId = id;
  document.getElementById('modalTitle').textContent = id ? 'Edit Holding' : 'Add Holding';
  document.querySelector('.btn-save').textContent = id ? 'Update' : 'Add Holding';
  if (id) {
    const h = holdings.find(x=>x.id===id);
    document.getElementById('fName').value = h.name;
    document.getElementById('fTicker').value = h.ticker;
    document.getElementById('fShares').value = h.shares;
    document.getElementById('fCost').value = h.avgCost;
    document.getElementById('fPrice').value = h.currentPrice;
    selectMarket(h.market, false);
    selectCurrency(h.currency, false);
  } else {
    document.getElementById('fName').value = '';
    document.getElementById('fTicker').value = '';
    document.getElementById('fShares').value = '';
    document.getElementById('fCost').value = '';
    document.getElementById('fPrice').value = '';
    selectMarket('DFM', false);
    selectCurrency('AED', false);
  }
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('fName').focus(), 300);
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function closeModalIfOutside(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

function selectMarket(m, rerender=true) {
  formMarket = m;
  document.querySelectorAll('#mktPills .pill').forEach(p => {
    p.className = 'pill';
    if (p.textContent.includes(m)) p.classList.add('active-' + m.toLowerCase().replace('international','intl'));
  });
}

function selectCurrency(c, rerender=true) {
  formCurrency = c;
  document.querySelectorAll('#curPills .pill').forEach(p => {
    p.className = 'pill';
    if (p.textContent.includes(c)) p.classList.add('active-' + c.toLowerCase());
  });
}

function saveHolding() {
  const name = document.getElementById('fName').value.trim();
  const ticker = document.getElementById('fTicker').value.trim().toUpperCase();
  const shares = parseFloat(document.getElementById('fShares').value);
  const avgCost = parseFloat(document.getElementById('fCost').value);
  const currentPrice = parseFloat(document.getElementById('fPrice').value);
  if (!name || !shares || !avgCost || !currentPrice) { showToast('Please fill all fields', 'error'); return; }
  const entry = { id: editId || Math.random().toString(36).slice(2,9), name, ticker, market: formMarket, shares, avgCost, currentPrice, currency: formCurrency };
  if (editId) holdings = holdings.map(h => h.id === editId ? entry : h);
  else holdings.push(entry);
  save(); closeModal(); render();
  showToast(editId ? 'Updated!' : 'Added!');
}

function editHolding(id) { openModal(id); }
function deleteHolding(id) {
  holdings = holdings.filter(h=>h.id!==id);
  save(); render(); showToast('Removed');
}

// ── Price editing ──
function startEditPrice(id, price) {
  editingPriceId = id;
  render();
  const inp = document.getElementById('pi-'+id);
  if (inp) { inp.focus(); inp.select(); }
}
function cancelPrice() { editingPriceId = null; render(); }
function confirmPrice(id) {
  const val = parseFloat(document.getElementById('pi-'+id)?.value);
  if (!isNaN(val) && val > 0) {
    holdings = holdings.map(h => h.id===id ? {...h, currentPrice:val} : h);
    save();
  }
  editingPriceId = null; render(); showToast('Price updated!');
}

// ── Toast ──
function showToast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type==='error' ? 'var(--red)' : 'var(--green)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Bind events ──
function bindEvents() {
  // pill clicks in modal re-bind on re-render automatically via onclick attrs
}

// ── PWA Install (Android/desktop) ──
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const res = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').classList.remove('show');
});

// ── iOS Add to Home Screen hint ──
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone;
if (isIOS && !isStandalone && !localStorage.getItem('ios-hint-shown')) {
  setTimeout(() => {
    showToast('Tip: Tap Share → Add to Home Screen to install!');
    localStorage.setItem('ios-hint-shown','1');
  }, 2500);
}

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  const sw = `
    const CACHE = 'portfolio-v1';
    const URLS = [self.location.href];
    self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c=>c.addAll(URLS))));
    self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));
  `;
  const swBlob = new Blob([sw], {type:'text/javascript'});
  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL).catch(()=>{});
}

// ── Init ──
load();
render();
</script>
