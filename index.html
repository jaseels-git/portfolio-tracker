<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Portfolio"/>
<meta name="theme-color" content="#16120E"/>
<title>Portfolio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:rgba(0,0,0,0)}
:root{
  --bg:#16120E;--bg2:#1E1814;--bg3:#252018;
  --card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
  --gold:#D4A847;--gold2:#F0C85A;--gold-dim:rgba(212,168,71,0.15);
  --green:#5DBF7F;--red:#E05555;
  --text:#F2EDE4;--muted:#8C8070;--dim:#5A5040;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;width:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;max-width:480px;margin:0 auto;-webkit-font-smoothing:antialiased}

/* Warm ambient glow */
body::before{content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 50% -10%,rgba(212,168,71,.12) 0%,transparent 60%),
    radial-gradient(ellipse at 100% 100%,rgba(180,100,60,.08) 0%,transparent 50%),
    radial-gradient(ellipse at 0% 80%,rgba(60,80,120,.06) 0%,transparent 50%);
  pointer-events:none;z-index:0}

/* ── HEADER ── */
#hdr{
  position:relative;z-index:5;
  padding:calc(var(--sat) + 20px) 20px 0;
  background:linear-gradient(180deg,#1E1814 0%,transparent 100%);
}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.hdr-logo{display:flex;align-items:center;gap:8px}
.hdr-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.hdr-logo-text{color:var(--gold);font-size:12px;letter-spacing:3px;text-transform:uppercase;font-weight:500}
.hdr-refresh{background:rgba(212,168,71,.12);border:1px solid rgba(212,168,71,.25);color:var(--gold);border-radius:10px;padding:6px 12px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px}
.rtime{color:var(--dim);font-size:10px;margin-top:2px;text-align:right}

/* ── DONUT CHART SECTION ── */
#chart-section{
  position:relative;z-index:1;
  padding:10px 20px 0;
  display:flex;flex-direction:column;align-items:center;
}
#chart-wrap{position:relative;width:220px;height:220px;margin:0 auto}
#chartCanvas{width:220px!important;height:220px!important}
.chart-center{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;pointer-events:none;
}
.chart-center-label{color:var(--muted);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.chart-center-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--text);line-height:1}
.chart-center-aed{color:var(--muted);font-size:11px;margin-top:3px}

/* ── STATS ROW BELOW CHART ── */
.stats-strip{
  display:flex;justify-content:space-between;
  padding:14px 20px;gap:8px;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.stat-item{flex:1;text-align:center}
.stat-lbl{color:var(--dim);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.stat-val{font-size:14px;font-weight:600;color:var(--text)}
.stat-sub{font-size:10px;color:var(--muted);margin-top:2px}

/* ── NAV ── */
#nav{
  position:sticky;top:0;z-index:20;
  display:flex;background:var(--bg2);
  border-bottom:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.nb{
  flex:1;padding:13px 0;background:none;border:none;
  border-bottom:2px solid transparent;
  color:var(--dim);font-size:11px;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  -webkit-appearance:none;transition:color .2s,border-color .2s;
  letter-spacing:.5px;text-transform:uppercase;
}
.nb.on{color:var(--gold);border-bottom-color:var(--gold)}
.ni{font-size:16px}

/* ── MAIN ── */
#main{position:relative;z-index:1;padding:16px 16px 110px}

/* ── LEGEND PILLS (market allocation) ── */
.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.legend-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:9px 11px;
}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.legend-name{color:var(--muted);font-size:11px;flex:1}
.legend-pct{color:var(--text);font-size:12px;font-weight:600}
.legend-val{color:var(--dim);font-size:10px}

/* ── MARKET TABS ── */
.mkt-tabs-wrap{margin-bottom:14px}
.mkt-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.mkt-tabs::-webkit-scrollbar{display:none}
.mkt-tab{
  flex-shrink:0;
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:10px 14px;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .2s;text-align:left;min-width:110px;
}
.mkt-tab.on{border-color:rgba(212,168,71,.5);background:rgba(212,168,71,.08)}
.mkt-tab-top{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.mkt-tab-flag{font-size:14px}
.mkt-tab-name{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.mkt-tab.on .mkt-tab-name{color:var(--gold)}
.mkt-tab-val{font-size:14px;font-weight:700;color:var(--text)}
.mkt-tab-pl{font-size:10px;margin-top:2px}

/* ── MARKET TOTAL BAR ── */
.mkt-total{
  background:linear-gradient(135deg,rgba(212,168,71,.08),rgba(212,168,71,.03));
  border:1px solid rgba(212,168,71,.2);
  border-radius:14px;padding:13px 15px;margin-bottom:13px;
  display:flex;justify-content:space-between;align-items:center;
}
.mkt-total-left{}
.mkt-total-label{color:var(--muted);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.mkt-total-val{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--text)}
.mkt-total-sub{color:var(--dim);font-size:11px;margin-top:2px}
.mkt-total-pl{text-align:right}
.mkt-total-pl-val{font-size:16px;font-weight:700}
.mkt-total-pl-pct{font-size:12px;margin-top:3px}
.mkt-total-invested{color:var(--dim);font-size:10px;margin-top:3px}

/* ── DASH STOCK ROW ── */
.dsr{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 0;border-bottom:1px solid rgba(255,255,255,.04);
  cursor:pointer;
}
.dsr:last-child{border-bottom:none;padding-bottom:2px}
.dsr:active{opacity:.7}
.dsi{
  width:38px;height:38px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;flex-shrink:0;
}
.dsname{color:var(--text);font-size:13px;font-weight:600;line-height:1.2}
.dssub{color:var(--dim);font-size:10px;margin-top:3px}
.dsval{color:var(--text);font-size:13px;font-weight:600;text-align:right}
.dspl{font-size:11px;margin-top:2px;text-align:right}
.dsaed{color:var(--dim);font-size:10px;margin-top:1px;text-align:right}

/* ── HOLDING CARD ── */
.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:18px;padding:15px;margin-bottom:11px;
}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.mbadge{font-size:10px;border:1px solid;border-radius:7px;padding:2px 9px;letter-spacing:.8px;font-weight:500}
.lbadge{font-size:9px;background:rgba(93,191,127,.12);color:var(--green);border-radius:5px;padding:2px 6px;margin-left:5px}
.acts{display:flex;gap:6px}
.ibtn{background:rgba(255,255,255,.05);border:none;border-radius:8px;padding:5px 9px;cursor:pointer;font-size:12px;-webkit-appearance:none}
.cmid{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:13px}
.hn{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--text)}
.hsb{color:var(--dim);font-size:11px;margin-top:3px}
.hv{font-size:15px;font-weight:600;text-align:right;color:var(--text)}
.ha{color:var(--dim);font-size:11px;margin-top:2px;text-align:right}

/* P&L BOX */
.plbox{
  border-radius:13px;padding:12px 14px;margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(0,0,0,.2);
}
.plm{font-size:16px;font-weight:700}
.pla{font-size:11px;margin-top:2px}
.plp{font-size:14px;font-weight:700}

/* INFO ROW */
.irow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.ibox{background:rgba(0,0,0,.15);border:1px solid rgba(255,255,255,.05);border-radius:11px;padding:10px}
.ilbl{color:var(--dim);font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.ival{font-size:12px;font-weight:600;color:var(--text)}
.isub{font-size:10px;color:var(--muted);margin-top:2px}

/* TARGET */
.twrap{margin-bottom:10px;background:rgba(0,0,0,.15);border:1px solid rgba(255,255,255,.05);border-radius:11px;padding:10px}
.tbg{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin:6px 0 5px}
.tfill{height:100%;border-radius:3px;transition:width .5s}

/* STATS GRID */
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.sbox{background:rgba(0,0,0,.2);border-radius:10px;padding:9px 6px;text-align:center}
.slbl{color:var(--dim);font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.sval{font-size:11px;font-weight:600;color:var(--text)}

/* PRICE ROW */
.upbtn{background:var(--gold-dim);border:1px solid rgba(212,168,71,.3);color:var(--gold);border-radius:9px;padding:7px 12px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-appearance:none}
.pinput{flex:1;background:rgba(255,255,255,.06);border:1px solid #3A3020;border-radius:9px;padding:7px 10px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}
.pok{background:var(--green);border:none;border-radius:9px;padding:7px 11px;color:#000;cursor:pointer;font-weight:700;-webkit-appearance:none}
.pcan{background:rgba(255,255,255,.06);border:none;border-radius:9px;padding:7px 11px;color:var(--muted);cursor:pointer;-webkit-appearance:none}

/* MARKETS TAB VIEW */
.msumm{display:flex;justify-content:space-between;align-items:flex-start;background:rgba(0,0,0,.2);border-radius:12px;padding:13px;margin-bottom:13px}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.mrow:last-child{border-bottom:none}

/* FAB */
#fab{
  position:fixed;bottom:calc(var(--sab) + 24px);right:18px;z-index:999;
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border:none;color:#1A1410;font-size:26px;font-weight:400;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 30px rgba(212,168,71,.45);
  cursor:pointer;-webkit-appearance:none;touch-action:manipulation;
}

/* MODAL */
#overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0);pointer-events:none;transition:background .25s}
#overlay.on{background:rgba(0,0,0,.88);pointer-events:all;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
#modal{
  position:fixed;bottom:0;left:50%;
  transform:translateX(-50%) translateY(100%);
  width:100%;max-width:480px;
  background:var(--bg2);
  border-radius:24px 24px 0 0;
  border-top:1px solid rgba(212,168,71,.2);
  padding:22px 18px calc(var(--sab) + 28px);
  max-height:93vh;overflow-y:auto;
  transition:transform .32s cubic-bezier(.32,.72,0,1);
  z-index:10000;-webkit-overflow-scrolling:touch;
}
#modal.on{transform:translateX(-50%) translateY(0)}
.mtitle{color:var(--gold);font-family:'Playfair Display',serif;font-size:20px;margin-bottom:18px}
.slbl2{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:8px;display:block}
.pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.pill{padding:7px 13px;border-radius:20px;border:1px solid rgba(255,255,255,.1);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;background:rgba(255,255,255,.04);color:var(--muted);-webkit-appearance:none;touch-action:manipulation}
.pill.on{color:#1A1410;border-color:transparent}
.srchwrap{position:relative;margin-bottom:12px}
.srch{width:100%;background:rgba(255,255,255,.06);border:1px solid #3A3020;border-radius:12px;padding:12px 38px 12px 14px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}
.srch:focus{border-color:rgba(212,168,71,.5)}
.sicon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
.sres{background:#1E1814;border:1px solid rgba(212,168,71,.15);border-radius:13px;overflow:hidden;margin-bottom:12px}
.sri{padding:11px 13px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:9px;touch-action:manipulation}
.sri:last-child{border-bottom:none}
.sri:active{background:rgba(212,168,71,.08)}
.selstock{background:rgba(212,168,71,.07);border:1px solid rgba(212,168,71,.2);border-radius:12px;padding:11px 13px;margin-bottom:13px;display:flex;justify-content:space-between;align-items:center}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.field{margin-bottom:14px}.field.full{grid-column:1/-1}
label{display:block;color:var(--dim);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:7px}
input[type=text],input[type=number]{width:100%;background:rgba(255,255,255,.05);border:1px solid #3A3020;border-radius:11px;padding:12px 13px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none;appearance:none}
input:focus{border-color:rgba(212,168,71,.5)}
.hint{font-size:11px;color:var(--gold);min-height:16px;margin-top:4px;grid-column:1/-1}
.mbtns{display:flex;gap:9px;margin-top:20px}
.bcan{flex:1;padding:15px;background:rgba(255,255,255,.05);border:none;border-radius:13px;color:var(--muted);font-size:15px;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-appearance:none;touch-action:manipulation}
.bsave{flex:2;padding:15px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:13px;color:#1A1410;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-appearance:none;touch-action:manipulation}

/* TOAST */
#toast{position:fixed;bottom:calc(var(--sab) + 90px);left:50%;transform:translateX(-50%) translateY(10px);padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;z-index:99999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

.empty{text-align:center;padding:30px 0}
.ei{font-size:34px}.et{color:var(--dim);font-size:13px;margin-top:9px}
.pos{color:var(--green)}.neg{color:var(--red)}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" async defer></script>
<script>
// ── Config ──
const AR=3.6725,IR=83.5;
const MKTS=['DFM','ADX','NSE','BSE','International','Crypto'];
const CLR={DFM:'#D4A847',ADX:'#5DBF7F',NSE:'#E8834C',BSE:'#E84C7A',International:'#5B8FD4',Crypto:'#A06CD5'};
const FLG={DFM:'🇦🇪',ADX:'🇦🇪',NSE:'🇮🇳',BSE:'🇮🇳',International:'🌐',Crypto:'₿'};
const SYM={AED:'د.إ',USD:'$',INR:'₹'};
const KEY='pf-v7';
const API='/api/prices';

// ── State ──
let H=[],TAB='d',eId=null,fMkt='DFM',fCur='AED',fStk=null,pie=null,epId=null,lastRfr=null,rfInt=null,sTimer=null;

// ── Storage ──
const ld=()=>{try{H=JSON.parse(localStorage.getItem(KEY)||'[]')}catch{H=[]}};
const sv=()=>localStorage.setItem(KEY,JSON.stringify(H));

// ── Format ──
const n2=(n,l='en-US')=>Math.abs(n).toLocaleString(l,{minimumFractionDigits:2,maximumFractionDigits:2});
const fU=n=>'$'+n2(n);
const fA=n=>'د.إ '+n2(n);
const fR=n=>'₹'+n2(n,'en-IN');
const fP=n=>(n>=0?'+':'')+n.toFixed(2)+'%';
const fN=(n,c)=>c==='AED'?fA(n):c==='INR'?fR(n):fU(n);
const toU=(a,c)=>c==='AED'?a/AR:c==='INR'?a/IR:a;
const frU=(a,c)=>c==='AED'?a*AR:c==='INR'?a*IR:a;

// ── Calc ──
function calc(h){
  const inv=h.buyPrice*h.shares,cur=h.currentPrice*h.shares;
  const iU=toU(inv,h.currency),cU=toU(cur,h.currency);
  const plU=cU-iU,plA=plU*AR,plP=iU>0?(plU/iU)*100:0;
  let tPct=null,toT=null;
  if(h.targetPrice&&h.targetPrice>h.buyPrice){
    tPct=Math.min(Math.max(((h.currentPrice-h.buyPrice)/(h.targetPrice-h.buyPrice))*100,0),100);
    toT=((h.targetPrice-h.currentPrice)/h.currentPrice)*100;
  }
  return{inv,cur,iU,cU,plU,plA,plP,tPct,toT};
}
function tots(){
  const cU=H.reduce((s,h)=>s+calc(h).cU,0),iU=H.reduce((s,h)=>s+calc(h).iU,0);
  return{cU,iU,plU:cU-iU,plP:iU>0?((cU-iU)/iU)*100:0};
}

// ── Header ──
function upHdr(){
  const t=tots(),pos=t.plU>=0;
  document.getElementById('hv').textContent=fU(t.cU);
  document.getElementById('ha').textContent=fA(t.cU*AR);
  document.getElementById('hi').textContent=fU(t.iU);
  const hp=document.getElementById('hp');
  hp.textContent=(pos?'▲ ':' ▼ ')+fU(Math.abs(t.plU));
  hp.className='stat-val '+(pos?'pos':'neg');
  const hpc=document.getElementById('hpc');
  hpc.textContent=fP(t.plP);
  hpc.className='stat-sub '+(pos?'pos':'neg');
  const hpa=document.getElementById('hpa');
  hpa.textContent=(pos?'▲ ':'▼ ')+fA(Math.abs(t.plU*AR));
  hpa.className='stat-val '+(pos?'pos':'neg');
}

// ── Draw Pie ──
function drawPie(){
  if(typeof Chart==='undefined'){setTimeout(drawPie,300);return;}
  const c=document.getElementById('chartCanvas');if(!c)return;
  if(pie){pie.destroy();pie=null;}
  // If market tab selected, show holdings within that market as slices
  let d;
  if(dTab){
    const mh=H.filter(h=>h.market===dTab);
    d=mh.map(h=>({name:h.ticker||h.name,v:calc(h).cU,color:CLR[dTab]})).filter(m=>m.v>0);
  } else {
    d=MKTS.map(m=>({name:m,v:H.filter(h=>h.market===m).reduce((s,h)=>s+calc(h).cU,0),color:CLR[m]})).filter(m=>m.v>0);
  }
  if(!d.length)return;
  pie=new Chart(c,{
    type:'doughnut',
    data:{
      labels:d.map(m=>m.name),
      datasets:[{
        data:d.map(m=>m.v),
        backgroundColor:d.map(m=>m.color||CLR[m.name]),
        borderWidth:3,
        borderColor:'#16120E',
        hoverOffset:6,
        borderRadius:4,
      }]
    },
    options:{
      cutout:'68%',
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{label:ctx=>' '+fU(ctx.raw)},
          backgroundColor:'#252018',
          titleColor:'#D4A847',
          bodyColor:'#F2EDE4',
          borderColor:'rgba(212,168,71,.2)',
          borderWidth:1,
          cornerRadius:12,
          padding:10,
        }
      },
      animation:{animateRotate:true,duration:800}
    }
  });
}

// ── Tabs ──
let dTab=null;
function go(t){
  TAB=t;
  ['d','h','m'].forEach(x=>document.getElementById('b'+x).classList.remove('on'));
  document.getElementById('b'+t).classList.add('on');
  render();
}
function render(){
  upHdr();
  // Show/hide chart section
  const cs=document.getElementById('chart-section');
  const ss=document.querySelector('.stats-strip');
  if(TAB==='d'){cs.style.display='flex';ss.style.display='flex';}
  else{cs.style.display='none';ss.style.display='none';}
  document.getElementById('main').innerHTML=TAB==='d'?rDash():TAB==='h'?rHold():rMkt();
  if(TAB==='d')drawPie();
  bindCards();
}

// ── Dashboard ──
function setDT(m){dTab=(dTab===m)?null:m;render();}

function rDash(){
  const t=tots();
  const am=MKTS.filter(m=>H.some(h=>h.market===m));
  if(!H.length) return '<div class="empty" style="padding-top:30px"><div class="ei">📊</div><div class="et">Tap + to add your first holding</div></div>';

  // Chart data: all markets or just selected
  const bm = dTab
    ? [{name:dTab, v:H.filter(h=>h.market===dTab).reduce((s,h)=>s+calc(h).cU,0)}]
    : MKTS.map(m=>({name:m,v:H.filter(h=>h.market===m).reduce((s,h)=>s+calc(h).cU,0)})).filter(m=>m.v>0);

  // Legend
  let leg='<div class="legend-grid">';
  bm.forEach(function(m){
    const total = dTab ? m.v : t.cU;
    leg+='<div class="legend-pill"><div class="legend-dot" style="background:'+CLR[m.name]+'"></div><div><div class="legend-name">'+FLG[m.name]+' '+m.name+'</div><div class="legend-val">'+fU(m.v)+'</div></div><div class="legend-pct">'+(total>0?((m.v/total)*100).toFixed(1):'0')+'%</div></div>';
  });
  leg+='</div>';

  // Market tabs — ALL + each market
  let tabs='<div class="mkt-tabs">';
  // ALL tab
  const allActive = dTab===null;
  tabs+='<div class="mkt-tab'+(allActive?' on':'')+'" onclick="setDT(null)" '+(allActive?'style="border-color:rgba(212,168,71,.5);background:rgba(212,168,71,.08)"':'')+'>'+
    '<div class="mkt-tab-top"><span class="mkt-tab-flag">◉</span><span class="mkt-tab-name">ALL</span></div>'+
    '<div class="mkt-tab-val">'+fU(t.cU)+'</div>'+
    '<div class="mkt-tab-pl '+(t.plU>=0?'pos':'neg')+'">'+(t.plU>=0?'▲':'▼')+' '+fP(t.plP)+'</div>'+
  '</div>';
  am.forEach(function(m){
    const mh=H.filter(h=>h.market===m);
    const mV=mh.reduce((s,h)=>s+calc(h).cU,0);
    const mI=mh.reduce((s,h)=>s+calc(h).iU,0);
    const mPL=mV-mI, mPos=mPL>=0, isAct=dTab===m;
    tabs+='<div class="mkt-tab'+(isAct?' on':'')+'" onclick="setDT(\''+m+'\')" '+(isAct?'style="border-color:rgba(212,168,71,.5);background:rgba(212,168,71,.08)"':'')+'>'+
      '<div class="mkt-tab-top"><span class="mkt-tab-flag">'+FLG[m]+'</span><span class="mkt-tab-name">'+m+'</span></div>'+
      '<div class="mkt-tab-val">'+fU(mV)+'</div>'+
      '<div class="mkt-tab-pl '+(mPos?'pos':'neg')+'">'+(mPos?'▲':'▼')+' '+fP(mI>0?(mPL/mI)*100:0)+'</div>'+
    '</div>';
  });
  tabs+='</div>';

  // Holdings list
  const showH = dTab
    ? H.filter(h=>h.market===dTab)
    : [...H].sort((a,b)=>calc(b).cU-calc(a).cU);

  let rows='';
  if(showH.length){
    if(dTab){
      const mV=showH.reduce((s,h)=>s+calc(h).cU,0);
      const mI=showH.reduce((s,h)=>s+calc(h).iU,0);
      const mPL=mV-mI, mPos=mPL>=0, mPLP=mI>0?(mPL/mI)*100:0;
      rows+='<div class="mkt-total">'+
        '<div class="mkt-total-left"><div class="mkt-total-label">'+FLG[dTab]+' '+dTab+' Total</div>'+
        '<div class="mkt-total-val">'+fU(mV)+'</div>'+
        '<div class="mkt-total-sub">'+fA(mV*AR)+'</div></div>'+
        '<div class="mkt-total-pl">'+
        '<div class="mkt-total-pl-val '+(mPos?'pos':'neg')+'">'+(mPos?'▲':'▼')+' '+fU(Math.abs(mPL))+'</div>'+
        '<div class="mkt-total-pl-pct '+(mPos?'pos':'neg')+'">'+fP(mPLP)+'</div>'+
        '<div class="mkt-total-invested">Invested: '+fU(mI)+'</div>'+
        '</div></div>';
    }
    rows+=showH.map(function(h){
      const{cU,plP,plU}=calc(h), sym=SYM[h.currency], p2=plP>=0;
      const init=(h.ticker||h.name).slice(0,2).toUpperCase();
      return '<div class="dsr">'+
        '<div style="display:flex;align-items:center;gap:10px">'+
        '<div class="dsi" style="background:'+CLR[h.market]+'22;color:'+CLR[h.market]+'">'+init+'</div>'+
        '<div><div class="dsname">'+h.name+(h.livePrice?' <span style="color:#5DBF7F;font-size:9px">●</span>':'')+'</div>'+
        '<div class="dssub">'+h.symbol+' · '+h.shares+' units · '+sym+h.currentPrice+'</div></div></div>'+
        '<div><div class="dsval">'+fU(cU)+'</div>'+
        '<div class="dspl '+(p2?'pos':'neg')+'">'+(p2?'▲':'▼')+' '+fU(Math.abs(plU))+' · '+fP(plP)+'</div>'+
        '<div class="dsaed">'+fA(cU*AR)+'</div></div></div>';
    }).join('');
  } else {
    rows='<div class="empty"><div class="ei">📭</div><div class="et">No '+dTab+' holdings yet</div></div>';
  }

  return leg+'<div style="height:12px"></div>'+tabs+rows;
}


// ── Holdings ──
function rHold(){
  if(!H.length)return'<div class="empty" style="padding-top:40px"><div class="ei">📭</div><div class="et">Tap + to add your first holding</div></div>';
  return H.map(function(h){
    const{cur,inv,cU,iU,plU,plA,plP,tPct,toT}=calc(h),pos=plP>=0,sym=SYM[h.currency],ep=epId===h.id;
    const bc=tPct>=100?'#5DBF7F':tPct>=60?'#D4A847':'#5B8FD4';
    const ts=h.targetPrice?'<div class="twrap"><div style="display:flex;justify-content:space-between"><span style="color:var(--dim);font-size:9px;letter-spacing:1px;text-transform:uppercase">Target</span><span style="font-size:11px;color:'+bc+'">'+(toT!==null?(toT>=0?'+'+toT.toFixed(1)+'% to go':'🎯 Reached!'):'—')+'</span></div><div class="tbg"><div class="tfill" style="width:'+(tPct||0)+'%;background:'+bc+'"></div></div><div style="display:flex;justify-content:space-between;margin-top:3px"><span style="color:var(--dim);font-size:10px">Buy: '+sym+h.buyPrice+'</span><span style="color:var(--dim);font-size:10px">Now: '+sym+h.currentPrice+'</span><span style="color:'+bc+';font-size:10px">Target: '+sym+h.targetPrice+'</span></div></div>':'';
    return '<div class="card"><div class="card-top"><div style="display:flex;align-items:center"><div class="mbadge" style="border-color:'+CLR[h.market]+';color:'+CLR[h.market]+'">'+FLG[h.market]+' '+h.market+'</div>'+(h.livePrice?'<span class="lbadge">● LIVE</span>':'')+'</div><div class="acts"><button class="ibtn" data-action="edit" data-id="'+h.id+'">✏️</button><button class="ibtn" data-action="del" data-id="'+h.id+'">🗑️</button></div></div><div class="cmid"><div><div class="hn">'+h.name+'</div><div class="hsb">'+h.symbol+' · '+h.shares+' units</div></div><div><div class="hv">'+fU(cU)+'</div><div class="ha">'+fA(cU*AR)+'</div></div></div><div class="plbox" style="border-left:3px solid '+(pos?'#5DBF7F':'#E05555')+'"><div><div style="color:var(--dim);font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px">Profit / Loss</div><div class="plm '+(pos?'pos':'neg')+'">'+(pos?'▲':'▼')+' '+fU(Math.abs(plU))+'</div><div class="pla '+(pos?'pos':'neg')+'">'+(pos?'▲':'▼')+' '+fA(Math.abs(plA))+'</div></div><div style="text-align:right"><div class="plp '+(pos?'pos':'neg')+'">'+fP(plP)+'</div><div style="color:var(--dim);font-size:10px;margin-top:2px">return</div></div></div><div class="irow"><div class="ibox"><div class="ilbl">Invested</div><div class="ival">'+fN(inv,h.currency)+'</div><div class="isub">'+fU(iU)+' · '+sym+h.buyPrice+'/unit</div></div><div class="ibox"><div class="ilbl">Value</div><div class="ival">'+fN(cur,h.currency)+'</div><div class="isub">'+fU(cU)+' · '+sym+h.currentPrice+'/unit</div></div></div>'+ts+'<div class="sgrid"><div class="sbox"><div class="slbl">Units</div><div class="sval">'+h.shares+'</div></div><div class="sbox"><div class="slbl">Buy</div><div class="sval">'+sym+h.buyPrice+'</div></div><div class="sbox"><div class="slbl">Target</div><div class="sval" style="color:'+(h.targetPrice?'#D4A847':'var(--dim)')+'">'+( h.targetPrice?sym+h.targetPrice:'—')+'</div></div></div><div style="display:flex;align-items:center;gap:7px" id="pr-'+h.id+'">'+(ep?'<input class="pinput" id="pi-'+h.id+'" type="number" value="'+h.currentPrice+'" inputmode="decimal"/><button class="pok" data-action="confp" data-id="'+h.id+'">✓</button><button class="pcan" data-action="cancp">✕</button>':'<button class="upbtn" data-action="editp" data-id="'+h.id+'">🔄 Update Price ('+sym+h.currentPrice+')</button>')+'</div></div>';
  }).join('');
}

// ── Markets ──
function rMkt(){
  const t=tots();let html='';
  MKTS.forEach(function(mk){
    const mh=H.filter(h=>h.market===mk);if(!mh.length)return;
    const mV=mh.reduce((s,h)=>s+calc(h).cU,0),mI=mh.reduce((s,h)=>s+calc(h).iU,0),mPL=mV-mI,mPos=mPL>=0,mPP=mI>0?(mPL/mI)*100:0;
    html+='<div style="margin-bottom:14px"><div style="color:'+CLR[mk]+';font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;font-weight:500">'+FLG[mk]+' '+mk+'</div>';
    html+='<div class="msumm"><div><div style="font-family:\'Playfair Display\',serif;font-size:19px;font-weight:700;color:var(--text)">'+fU(mV)+'</div><div style="color:var(--dim);font-size:11px;margin-top:2px">'+fA(mV*AR)+'</div><div style="color:var(--dim);font-size:10px;margin-top:2px">Invested: '+fU(mI)+'</div></div><div style="text-align:right"><div style="font-size:14px;font-weight:700" class="'+(mPos?'pos':'neg')+'">'+(mPos?'▲':'▼')+' '+fU(Math.abs(mPL))+'</div><div style="font-size:12px;margin-top:2px" class="'+(mPos?'pos':'neg')+'">'+fP(mPP)+'</div><div style="color:var(--dim);font-size:10px;margin-top:2px">'+(t.cU>0?((mV/t.cU)*100).toFixed(1)+'%':'0%')+' of total</div></div></div>';
    html+=mh.map(function(h){const{cU,plP}=calc(h),sym=SYM[h.currency];return'<div class="mrow"><div><div style="color:var(--text);font-size:13px;font-weight:500">'+h.name+(h.livePrice?' <span style="color:#5DBF7F;font-size:9px">●</span>':'')+'</div><div style="color:var(--dim);font-size:10px;margin-top:2px">'+h.symbol+' · '+h.shares+' units · Buy: '+sym+h.buyPrice+(h.targetPrice?' · 🎯'+sym+h.targetPrice:'')+'</div></div><div style="text-align:right"><div style="color:var(--text);font-size:13px">'+fU(cU)+'</div><div style="font-size:11px" class="'+(plP>=0?'pos':'neg')+'">'+fP(plP)+'</div></div></div>';}).join('');
    html+='</div>';
  });
  return html||'<div class="empty" style="padding-top:40px"><div class="ei">📭</div><div class="et">No holdings yet</div></div>';
}

// ── Bind card buttons ──
function bindCards(){
  const m=document.getElementById('main');
  m.onclick=function(e){
    const btn=e.target.closest('[data-action]');if(!btn)return;
    const act=btn.dataset.action,id=btn.dataset.id;
    if(act==='edit')openModal(id);
    else if(act==='del')delH(id);
    else if(act==='editp'){epId=id;render();const i=document.getElementById('pi-'+id);if(i){i.focus();i.select();}}
    else if(act==='confp'){const v=parseFloat(document.getElementById('pi-'+id)?.value);if(!isNaN(v)&&v>0){H=H.map(h=>h.id===id?{...h,currentPrice:v,livePrice:false}:h);sv();}epId=null;render();toast('Price updated!');}
    else if(act==='cancp'){epId=null;render();}
  };
}

// ── Modal ──
function openModal(id=null){
  eId=id;
  document.getElementById('mt').textContent=id?'Edit Holding':'Add Holding';
  document.getElementById('bsave').textContent=id?'Update':'Add Holding';
  if(id){
    const h=H.find(x=>x.id===id);
    fStk={symbol:h.symbol,name:h.name};
    sm(h.market);
    document.getElementById('ss').style.display='block';
    document.getElementById('ss').innerHTML='<div class="selstock"><div><div style="color:var(--text);font-size:13px;font-weight:600">'+h.name+'</div><div style="color:var(--gold);font-size:11px;margin-top:2px">'+h.symbol+' · '+h.market+'</div></div><button onclick="clrStk()" style="background:rgba(255,255,255,.06);border:none;border-radius:7px;padding:4px 9px;color:var(--muted);cursor:pointer;font-size:12px">Change</button></div>';
    document.getElementById('s3').style.display='block';
    document.getElementById('ff').style.display='block';
    document.getElementById('fsh').value=h.shares;
    document.getElementById('fbp').value=h.buyPrice;
    document.getElementById('ftp').value=h.targetPrice||'';
    sc(h.currency);
  } else {
    fStk=null;
    document.getElementById('si').value='';
    document.getElementById('sr').innerHTML='';
    document.getElementById('ss').style.display='none';
    document.getElementById('s3').style.display='none';
    document.getElementById('ff').style.display='none';
    document.getElementById('fsh').value='';
    document.getElementById('fbp').value='';
    document.getElementById('ftp').value='';
    sm('DFM');sc('AED');
  }
  upHint();
  document.getElementById('overlay').classList.add('on');
  document.getElementById('modal').classList.add('on');
}
function closeModal(){
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('modal').classList.remove('on');
}

// ── Market / Currency ──
function sm(m){
  fMkt=m;
  document.querySelectorAll('#mktp .pill').forEach(function(p){
    p.classList.remove('on');p.style.background='';p.style.color='';
    const t=p.textContent;
    if((m==='International'&&t.includes('Intl'))||t.includes(m)){
      p.classList.add('on');p.style.background=CLR[m];p.style.color='#1A1410';
    }
  });
  const ph={DFM:'Search UAE stocks...',ADX:'Search ADX stocks...',NSE:'Search NSE stocks...',BSE:'Search BSE stocks...',International:'Search global stocks...',Crypto:'Search crypto...'};
  document.getElementById('si').placeholder=ph[m]||'Search...';
  document.getElementById('si').value='';
  document.getElementById('sr').innerHTML='';
}
function sc(c){
  fCur=c;
  document.querySelectorAll('#curp .pill').forEach(function(p){
    p.classList.remove('on');p.style.background='';p.style.color='';
    if(p.textContent.includes(c)){p.classList.add('on');p.style.background='#D4A847';p.style.color='#1A1410';}
  });
  upHint();
}
function upHint(){
  const sh=parseFloat(document.getElementById('fsh')?.value)||0,bp=parseFloat(document.getElementById('fbp')?.value)||0;
  document.getElementById('fh').textContent=sh&&bp?'Total invested: '+(SYM[fCur]||'$')+(sh*bp).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):'';
}

// ── Search ──
function doSearch(q){
  if(q.length<2){document.getElementById('sr').innerHTML='';return;}
  clearTimeout(sTimer);
  sTimer=setTimeout(async function(){
    try{
      const resp=await fetch(API+'?action=search&query='+encodeURIComponent(q)+'&market='+encodeURIComponent(fMkt));
      const d=await resp.json();
      const res=d.results||[];
      let html='';
      if(res.length){
        html+='<div class="sres">';
        res.forEach(function(item){
          const safeName=item.name.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
          const icon=item.thumb?('<img src="'+item.thumb+'" style="width:22px;height:22px;border-radius:50%">'):'<div style="width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:11px">'+(item.type==='crypto'?'&#x20BF;':'&#x1F4C8;')+'</div>';
          html+='<div class="sri" data-sym="'+item.symbol+'" data-name="'+safeName+'" data-exch="'+(item.exchange||fMkt)+'">';
          html+=icon;
          html+='<div style="flex:1;min-width:0"><div style="color:var(--text);font-size:13px;font-weight:500">'+item.name+'</div><div style="color:var(--dim);font-size:11px">'+item.symbol+'</div></div>';
          html+='<div style="color:var(--gold);font-size:10px;background:var(--gold-dim);border-radius:5px;padding:1px 6px">'+(item.exchange||fMkt)+'</div>';
          html+='</div>';
        });
        html+='</div>';
      }
      const suffixes={DFM:'.DU',ADX:'.AD',NSE:'.NS',BSE:'.BO',International:'',Crypto:''};
      const sfx=suffixes[fMkt]||'';
      const sugTicker=q.toUpperCase().replace(/\s+/g,'')+sfx;
      html+='<div onclick="addManually(\''+sugTicker+'\',\''+q+'\')" style="padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:10px;background:rgba(212,168,71,.05);border:1px dashed rgba(212,168,71,.25);border-radius:11px;margin-top:6px"><div style="width:30px;height:30px;border-radius:8px;background:var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:14px">✏️</div><div><div style="color:var(--gold);font-size:13px;font-weight:600">Add "'+q+'" manually</div><div style="color:var(--dim);font-size:11px;margin-top:2px">Ticker: '+sugTicker+' · tap to customise</div></div></div>';
      document.getElementById('sr').innerHTML=html;
    }catch(e){
      const suffixes={DFM:'.DU',ADX:'.AD',NSE:'.NS',BSE:'.BO',International:'',Crypto:''};
      const sfx=suffixes[fMkt]||'';
      const sugTicker=q.toUpperCase().replace(/\s+/g,'')+sfx;
      document.getElementById('sr').innerHTML='<div onclick="addManually(\''+sugTicker+'\',\''+q+'\')" style="padding:11px 13px;cursor:pointer;display:flex;align-items:center;gap:10px;background:rgba(212,168,71,.05);border:1px dashed rgba(212,168,71,.25);border-radius:11px"><div style="width:30px;height:30px;border-radius:8px;background:var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:14px">✏️</div><div><div style="color:var(--gold);font-size:13px;font-weight:600">Add "'+q+'" manually</div><div style="color:var(--dim);font-size:11px;margin-top:2px">Ticker: '+sugTicker+'</div></div></div>';
    }
  },400);
}
function addManually(sugTicker,name){
  const ticker=prompt('Enter ticker symbol:',sugTicker);
  if(!ticker)return;
  const displayName=prompt('Enter stock name:',name);
  if(!displayName)return;
  selStk(ticker.toUpperCase().trim(),displayName.trim());
}

function selStk(sym,name){
  fStk={symbol:sym,name:name};
  document.getElementById('sr').innerHTML='';
  document.getElementById('si').value='';
  document.getElementById('ss').style.display='block';
  document.getElementById('ss').innerHTML='<div class="selstock"><div><div style="color:var(--text);font-size:13px;font-weight:600">'+name+'</div><div style="color:var(--gold);font-size:11px;margin-top:2px">'+sym+' · '+fMkt+'</div></div><button onclick="clrStk()" style="background:rgba(255,255,255,.06);border:none;border-radius:7px;padding:4px 9px;color:var(--muted);cursor:pointer;font-size:12px;-webkit-appearance:none">Change</button></div>';
  document.getElementById('s3').style.display='block';
  document.getElementById('ff').style.display='block';
  const ac={DFM:'AED',ADX:'AED',NSE:'INR',BSE:'INR',International:'USD',Crypto:'USD'};
  sc(ac[fMkt]||'USD');
}
function clrStk(){
  fStk=null;
  document.getElementById('ss').style.display='none';
  document.getElementById('ss').innerHTML='';
  document.getElementById('s3').style.display='none';
  document.getElementById('ff').style.display='none';
}

// ── Save ──
function saveH(){
  if(!fStk){toast('Please search and select an asset','error');return;}
  const sh=parseFloat(document.getElementById('fsh').value),bp=parseFloat(document.getElementById('fbp').value),tp=parseFloat(document.getElementById('ftp').value)||null;
  if(!sh||!bp){toast('Fill in shares and buy price','error');return;}
  const e={id:eId||Math.random().toString(36).slice(2,9),name:fStk.name,ticker:fStk.symbol,symbol:fStk.symbol,market:fMkt,shares:sh,buyPrice:bp,currentPrice:bp,targetPrice:tp,currency:fCur,livePrice:false};
  if(eId)H=H.map(h=>h.id===eId?{...h,...e,id:eId}:h);else H.push(e);
  sv();closeModal();render();
  toast(eId?'Updated!':'Added! Fetching live price...');
  setTimeout(function(){rfr();},600);
}
function delH(id){if(!confirm('Remove this holding?'))return;H=H.filter(h=>h.id!==id);sv();render();toast('Removed');}

// ── Live Prices ──
async function rfr(manual=false){
  if(!H.length)return;
  const rb=document.getElementById('rb');if(rb){rb.disabled=true;rb.textContent='Refreshing...';}
  const syms=H.map(h=>(h.market==='Crypto'?'crypto:':'')+h.symbol).join(',');
  try{
    const r=await fetch(API+'?action=prices&symbols='+encodeURIComponent(syms));
    const d=await r.json();
    if(d.prices){
      console.log('Received prices:', JSON.stringify(d.prices));
      H=H.map(function(h){
        const k=(h.market==='Crypto'?'crypto:':'')+h.symbol;
        if(d.prices[k]){
          const p=d.prices[k];
          let price=p.price;
          const apiCur=p.currency||'USD';
          // Only convert if currencies differ
          if(apiCur!==h.currency){
            // Step 1: convert api price to USD
            const priceUSD = apiCur==='AED'?price/AR:apiCur==='INR'?price/IR:price;
            // Step 2: convert USD to holding currency
            price = h.currency==='AED'?priceUSD*AR:h.currency==='INR'?priceUSD*IR:priceUSD;
          }
          console.log('Updated:', h.symbol, 'api:', p.price, apiCur, '-> stored:', price, h.currency);
          return{...h,currentPrice:parseFloat(price.toFixed(4)),change24h:p.change24h||0,livePrice:true};
        }
        return h;
      });
      sv();lastRfr=new Date();upRlbl();render();
      if(manual)toast('Prices updated ✓');
    }
  }catch(e){if(manual)toast('Could not fetch prices','error');}
  finally{if(rb){rb.disabled=false;rb.textContent='🔄 Refresh';}}
}
function upRlbl(){const el=document.getElementById('rl');if(!el||!lastRfr)return;const m=Math.round((Date.now()-lastRfr)/60000);el.textContent=m===0?'just now':m+'m ago';}

// ── Toast ──
function toast(msg,type='success'){const e=document.getElementById('toast');e.textContent=msg;e.style.background=type==='error'?'#E05555':'#5DBF7F';e.classList.add('on');setTimeout(function(){e.classList.remove('on');},2500);}

// ── Bind UI ──
function bindUI(){
  document.getElementById('overlay').onclick=function(){closeModal();};
  document.getElementById('bcan').onclick=function(){closeModal();};
  document.getElementById('bsave').onclick=function(){saveH();};
  document.getElementById('si').oninput=function(){doSearch(this.value);};
  document.getElementById('sr').onclick=function(e){const r=e.target.closest('.sri');if(r)selStk(r.dataset.sym,r.dataset.name);};
  document.getElementById('fsh').oninput=upHint;
  document.getElementById('fbp').oninput=upHint;
}
bindUI();

// ── Init ──
ld();render();
setTimeout(rfr,800);
setInterval(rfr,60000);
setInterval(upRlbl,30000);
</script>
</body>
</html>
