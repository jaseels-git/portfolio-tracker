<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Portfolio"/>
<meta name="theme-color" content="#16120E"/>
<title>Portfolio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:rgba(0,0,0,0)}
:root{\
  --bg:#16120E;--bg2:#1E1814;--bg3:#252018;\
  --card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);\
  --gold:#D4A847;--gold2:#F0C85A;--gold-dim:rgba(212,168,71,0.15);\
  --txt:#F4F1EA;--dim:#9C958B;--up:#5DBF7F;--dn:#E05555;\
  --nav-h:72px;--ff-serif:'Playfair Display',serif;--ff-sans:'DM Sans',sans-serif;\
}
body{background:var(--bg);color:var(--txt);font-family:var(--ff-sans);font-weight:400;min-height:100vh;padding-bottom:100px;overflow-x:hidden;-webkit-font-smoothing:antialiased}\
.nav{height:var(--nav-h);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:between;padding:0 24px;background:var(--bg2);position:sticky;top:0;z-index:90}\
.nav-inner{width:100%;max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}\
.logo{font-family:var(--ff-serif);font-size:24px;font-weight:700;color:var(--gold);letter-spacing:-0.5px}\
.rbtn{background:var(--gold-dim);color:var(--gold2);border:1px solid rgba(212,168,71,0.3);padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.2s;font-family:var(--ff-sans)}\
.rbtn:hover{background:rgba(212,168,71,0.25);transform:translateY(-1px)}\
.rbtn:disabled{opacity:0.5;cursor:not-allowed}\
.main{max-width:1200px;margin:0 auto;padding:32px 24px}\
.hero{margin-bottom:32px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px}\
.h-left h1{font-family:var(--ff-serif);font-size:40px;font-weight:600;line-height:1.1;margin-bottom:6px}\
.h-left p{color:var(--dim);font-size:14px;font-weight:300}\
.h-right{text-align:right}\
.tval{font-size:36px;font-weight:500;letter-spacing:-1px;color:var(--txt);margin-bottom:4px}\
.tpnl{font-size:14px;font-weight:500;display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:12px}\
.tpnl.up{background:rgba(93,191,127,0.1);color:var(--up)}\
.tpnl.dn{background:rgba(224,85,85,0.1);color:var(--dn)}\
.tabs{display:flex;gap:8px;border-bottom:1px solid var(--border);margin-bottom:24px;padding-bottom:1px;overflow-x:auto;scrollbar-width:none}\
.tabs::-webkit-scrollbar{display:none}\
.tab{padding:10px 16px;color:var(--dim);cursor:pointer;font-size:14px;font-weight:500;transition:all 0.2s;border-bottom:2px solid transparent;white-space:nowrap}\
.tab:hover{color:var(--txt)}\
.tab.active{color:var(--gold2);border-bottom-color:var(--gold)}\
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}\
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px;transition:all 0.2s;position:relative;cursor:pointer}\
.card:hover{border-color:rgba(255,255,255,0.15);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.2)}\
.c-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}\
.c-ticker{font-family:var(--ff-serif);font-size:18px;font-weight:700;color:var(--txt)}\
.c-name{font-size:12px;color:var(--dim);margin-top:2px;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\
.badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:8px;text-transform:uppercase;letter-spacing:0.5px}\
.badge.dfm{background:rgba(212,168,71,0.12);color:var(--gold2);border:1px solid rgba(212,168,71,0.2)}\
.badge.adx{background:rgba(156,149,139,0.12);color:#C4BEB5;border:1px solid rgba(156,149,139,0.2)}\
.badge.india{background:rgba(224,130,85,0.12);color:#F49E78;border:1px solid rgba(224,130,85,0.2)}\
.badge.intl{background:rgba(93,150,191,0.12);color:#82B6DC;border:1px solid rgba(93,150,191,0.2)}\
.badge.crypto{background:rgba(164,93,191,0.12);color:#CE87E3;border:1px solid rgba(164,93,191,0.2)}\
.c-mid{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px}\
.c-price{font-size:22px;font-weight:500;letter-spacing:-0.5px}\
.c-chg{font-size:13px;font-weight:500}\
.c-chg.up{color:var(--up)}\
.c-chg.dn{color:var(--dn)}\
.c-bot{border-top:1px solid rgba(255,255,255,0.04);padding-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:12px}\
.c-label{font-size:11px;color:var(--dim);margin-bottom:2px;text-transform:uppercase;letter-spacing:0.3px}\
.c-val{font-size:14px;font-weight:500;color:var(--txt)}\
.c-val.up{color:var(--up)}\
.c-val.dn{color:var(--dn)}\
.fab{position:fixed;bottom:32px;right:32px;width:56px;height:56px;background:var(--gold);color:var(--bg);border-radius:28px;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;box-shadow:0 8px 24px rgba(212,168,71,0.3);transition:all 0.2s;z-index:80;border:none}\
.fab:hover{transform:scale(1.05) rotate(90deg);background:var(--gold2)}\
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(11,9,8,0.8);backdrop-filter:blur(8px);z-index:100;opacity:0;pointer-events:none;transition:opacity 0.25s}\
.overlay.on{opacity:1;pointer-events:all}\
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-40%) scale(0.95);width:90%;max-width:440px;background:var(--bg2);border:1px solid var(--border);border-radius:24px;padding:28px;z-index:101;opacity:0;pointer-events:none;transition:all 0.25s cubic-bezier(0.16,1,0.3,1)}\
.modal.on{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1)}\
.m-title{font-family:var(--ff-serif);font-size:24px;font-weight:600;margin-bottom:20px;color:var(--txt)}\
.f-grp{margin-bottom:16px}\
.f-lbl{display:block;font-size:12px;color:var(--dim);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}\
.f-row{display:flex;gap:8px}\
.inp{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--txt);font-family:var(--ff-sans);font-size:14px;transition:all 0.2s}\
.inp:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,71,0.15)}\
select.inp{cursor:pointer;appearance:none}\
.s-res{background:var(--bg3);border:1px solid var(--border);border-radius:12px;max-height:160px;overflow-y:auto;margin-top:4px;display:none}\
.s-res.on{display:block}\
.s-item{padding:10px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.02);display:flex;justify-content:space-between}\
.s-item:hover{background:rgba(255,255,255,0.02)}\
.s-item span{color:var(--dim)}\
.m-btns{display:flex;gap:12px;margin-top:24px}\
.btn{flex:1;padding:12px;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:var(--ff-sans);text-align:center;border:none}\
.btn-p{background:var(--gold);color:var(--bg)}\
.btn-p:hover{background:var(--gold2)}\
.btn-s{background:transparent;color:var(--dim);border:1px solid var(--border)}\
.btn-s:hover{background:rgba(255,255,255,0.02);color:var(--txt)}\
.btn-del{background:rgba(224,85,85,0.1);color:var(--dn);border:1px solid rgba(224,85,85,0.2);margin-bottom:12px;display:none}\
.btn-del:hover{background:rgba(224,85,85,0.15)}\
.toast{position:fixed;bottom:24px;left:50%;transform:translate(-50%,20px);background:#5DBF7F;color:#16120E;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,0.2);z-index:120;opacity:0;pointer-events:none;transition:all 0.2s}\
.toast.on{opacity:1;transform:translate(-50%,0)}\
@media(max-width:600px){\
  .nav{padding:0 16px}\
  .main{padding:20px 16px}\
  .h-left h1{font-size:32px}\
  .grid{grid-template-columns:1fr}\
}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-inner">
    <div class="logo">Portfolio</div>
    <button class="rbtn" id="rb" onclick="refreshPrices(true)">🔄 Refresh</button>
  </div>
</div>

<div class="main">
  <div class="hero">
    <div class="h-left">
      <h1 id="total-val">0.00</h1>
      <p>Multi-Market Value &bull; Last pull: <span id="rl">never</span></p>
    </div>
    <div class="h-right">
      <div class="tpnl" id="total-pnl">0.00 (0.00%)</div>
    </div>
  </div>

  <div class="tabs" id="tb">
    <div class="tab active" onclick="setTab('all')">All Assets</div>
    <div class="tab" onclick="setTab('dfm')">DFM</div>
    <div class="tab" onclick="setTab('adx')">ADX</div>
    <div class="tab" onclick="setTab('india')">India</div>
    <div class="tab" onclick="setTab('intl')">International</div>
    <div class="tab" onclick="setTab('crypto')">Crypto</div>
  </div>

  <div class="grid" id="gd"></div>
</div>

<button class="fab" onclick="openModal()">+</button>

<div class="overlay" id="overlay"></div>

<div class="modal" id="modal">
  <div class="m-title" id="mt">Add Investment</div>
  <button class="btn btn-del" id="bdel" onclick="delH()">Delete Investment</button>
  <div class="f-grp">
    <label class="f-lbl">Market Region</label>
    <select class="inp" id="sm" onchange="mChg()">
      <option value="dfm">Dubai (DFM)</option>
      <option value="adx">Abu Dhabi (ADX)</option>
      <option value="india">India (NSE)</option>
      <option value="intl">International (US)</option>
      <option value="crypto">Cryptocurrency</option>
    </select>
  </div>
  <div class="f-grp">
    <label class="f-lbl">Search Ticker / Name</label>
    <input type="text" class="inp" id="si" placeholder="e.g. EMAAR, AAPL, BTC..."/>
    <div class="s-res" id="sr"></div>
  </div>
  <div class="f-grp f-row">
    <div style="flex:1">
      <label class="f-lbl">Shares / Vol</label>
      <input type="number" step="any" class="inp" id="sq" placeholder="0.00"/>
    </div>
    <div style="flex:1">
      <label class="f-lbl">Buy Price (Avg)</label>
      <input type="number" step="any" class="inp" id="sp" placeholder="0.00"/>
    </div>
  </div>
  <div class="m-btns">
    <button class="btn btn-s" id="bcan">Cancel</button>
    <button class="btn btn-p" id="bsave">Save Holdings</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Global Variables & Data Management ──
let H = []; 
let curTab = 'all';
let editId = null;
let lastRfr = null;

// Initialize System
window.onload = function() {
  loadH();
  bindUI();
  render();
  
  // Non-blocking silent data sync on startup
  setTimeout(() => {
    refreshPrices(false);
  }, 400);

  // Auto label dynamic counter update
  setInterval(upRlbl, 30000);
};

function loadH() {
  try {
    const raw = localStorage.getItem('p_holdings');
    const rTime = localStorage.getItem('p_last_refresh');
    if (raw) H = JSON.parse(raw);
    if (rTime) lastRfr = new Date(parseInt(rTime));
  } catch(e) {
    H = [];
  }
}

function sv() {
  localStorage.setItem('p_holdings', JSON.stringify(H));
  if (lastRfr) localStorage.setItem('p_last_refresh', lastRfr.getTime().toString());
}

// ── Built-In Search Database ──
const DB = {
  dfm:[
    {s:'EMAAR.DU',n:'Emaar Properties'},{s:'ENBD.DU',n:'Emirates NBD'},{s:'DIB.DU',n:'Dubai Islamic Bank'},
    {s:'DEWA.DU',n:'DEWA'},{s:'DFM.DU',n:'Dubai Financial Market'},{s:'SALIK.DU',n:'Salik Company'},
    {s:'PARKIN.DU',n:'Parkin Company'},{s:'AIRARABIA.DU',n:'Air Arabia'}
  ],
  adx:[
    {s:'IHC.AD',n:'International Holding Co'},{s:'FAB.AD',n:'First Abu Dhabi Bank'},{s:'ADNOCDIST.AD',n:'ADNOC Distribution'},
    {s:'ALDAR.AD',n:'Aldar Properties'},{s:'BOROUGE.AD',n:'Borouge'},{s:'MULTIPLY.AD',n:'Multiply Group'}
  ],
  india:[
    {s:'RELIANCE.NS',n:'Reliance Industries'},{s:'TCS.NS',n:'Tata Consultancy Services'},{s:'INFY.NS',n:'Infosys Ltd'},
    {s:'HDFCBANK.NS',n:'HDFC Bank'},{s:'ICICIBANK.NS',n:'ICICI Bank'},{s:'WIT.NS',n:'Wipro Ltd'}
  ],
  intl:[
    {s:'AAPL',n:'Apple Inc.'},{s:'MSFT',n:'Microsoft Corp.'},{s:'TSLA',n:'Tesla Inc.'},
    {s:'NVDA',n:'NVIDIA Corp.'},{s:'AMZN',n:'Amazon.com Inc.'},{s:'META',n:'Meta Platforms'}
  ],
  crypto:[
    {s:'crypto:bitcoin',n:'Bitcoin (BTC)'},{s:'crypto:ethereum',n:'Ethereum (ETH)'},
    {s:'crypto:solana',n:'Solana (SOL)'},{s:'crypto:ripple',n:'Ripple (XRP)'}
  ]
};

// ── Rendering Engine (Formulas Integrated) ──
function render() {
  const grid = document.getElementById('gd');
  grid.innerHTML = '';
  
  let totalPortfolioValue = 0;
  let totalPortfolioCost = 0;
  
  // Filter holdings matching view setting
  const filtered = H.filter(h => curTab === 'all' || h.market === curTab);

  // Compute metrics loop
  filtered.forEach(h => {
    const buyPrice = parseFloat(h.buyPrice) || 0;
    const shares = parseFloat(h.shares) || 0;
    const livePrice = parseFloat(h.livePrice) || buyPrice; // Fallback to cost basis safely if live not pulled yet
    
    const costBasis = shares * buyPrice;
    const currentVal = shares * livePrice;
    
    totalPortfolioValue += currentVal;
    totalPortfolioCost += costBasis;
    
    // Mathematical Deltas
    const profit = currentVal - costBasis;
    const pct = buyPrice > 0 ? (profit / costBasis) * 100 : 0;
    
    const isUp = profit >= 0;
    const symbolCurrency = h.market === 'india' ? 'INR' : (h.market === 'intl' || h.market === 'crypto' ? 'USD' : 'AED');

    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openModal(h.id);
    
    card.innerHTML = `
      <div class="c-top">
        <div>
          <div class="c-ticker">${h.ticker}</div>
          <div class="c-name">${h.name || h.ticker}</div>
        </div>
        <span class="badge ${h.market}">${h.market}</span>
      </div>
      <div class="c-mid">
        <div class="c-price">${livePrice.toFixed(2)} <span style="font-size:11px; color:var(--dim)">${symbolCurrency}</span></div>
        <div class="c-chg ${isUp ? 'up' : 'dn'}">
          ${isUp ? '▲' : '▼'} ${Math.abs(pct).toFixed(2)}%
        </div>
      </div>
      <div class="c-bot">
        <div>
          <div class="c-label">Holding Value</div>
          <div class="c-val">${currentVal.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        </div>
        <div>
          <div class="c-label">Net Profit</div>
          <div class="c-val ${isUp ? 'up' : 'dn'}">${isUp ? '+' : ''}${profit.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
        </div>
        <div>
          <div class="c-label">Shares</div>
          <div class="c-val">${shares}</div>
        </div>
        <div>
          <div class="c-label">Cost Basis (Avg)</div>
          <div class="c-val">${buyPrice.toFixed(2)}</div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });

  // Render Core Top Dashboard Summary Counters
  const netGain = totalPortfolioValue - totalPortfolioCost;
  const netPct = totalPortfolioCost > 0 ? (netGain / totalPortfolioCost) * 100 : 0;
  
  document.getElementById('total-val').textContent = totalPortfolioValue.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) + ' AED';
  
  const pnlEl = document.getElementById('total-pnl');
  pnlEl.className = `tpnl ${netGain >= 0 ? 'up' : 'dn'}`;
  pnlEl.textContent = `${netGain >= 0 ? '▲ +' : '▼ '}${netGain.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})} AED (${netPct.toFixed(2)}%)`;
  
  upRlbl();
}

// ── Silent Async Network Engine ──
async function refreshPrices(manual = false) {
  if (H.length === 0) {
    if (manual) toast('No holdings found to update');
    return;
  }
  
  const rb = document.getElementById('rb');
  if (rb) { rb.disabled = true; rb.textContent = '⚡ Updating...'; }
  
  try {
    // Collect all query identifiers 
    const queryTickers = H.map(h => h.ticker).join(',');
    const response = await fetch(`/api/prices?stocks=${encodeURIComponent(queryTickers)}`);
    
    if (!response.ok) throw new Error('API Error');
    const data = await response.json();
    
    if (data && typeof data === 'object') {
      H = H.map(h => {
        if (data[h.ticker] && data[h.ticker].price) {
          h.livePrice = parseFloat(data[h.ticker].price);
        }
        return h;
      });
      
      lastRfr = new Date();
      sv();
      render();
      
      const parsedCount = H.filter(h => h.livePrice).length;
      if (manual) toast('Synced live updates for ' + parsedCount + '/' + H.length + ' positions ✓');
    }
  } catch(e) {
    if (manual) toast('Server latency issue. Retrying...', 'error');
  } finally {
    if (rb) { rb.disabled = false; rb.textContent = '🔄 Refresh'; }
  }
}

function upRlbl() {
  const el = document.getElementById('rl');
  if (!el || !lastRfr) return;
  const diff = Math.round((Date.now() - lastRfr) / 60000);
  el.textContent = diff === 0 ? 'just now' : diff + 'm ago';
}

// ── Search & Core Modal Engine ──
function doSearch(val) {
  const m = document.getElementById('sm').value;
  const container = document.getElementById('sr');
  container.innerHTML = '';
  
  if (!val) { container.classList.remove('on'); return; }
  
  // Local list matching
  const list = DB[m] || [];
  const matches = list.filter(i => i.s.toLowerCase().includes(val.toLowerCase()) || i.n.toLowerCase().includes(val.toLowerCase()));
  
  // Append standard dynamic row
  if (matches.length > 0) {
    matches.forEach(item => {
      const div = document.createElement('div');
      div.className = 's-item';
      div.innerHTML = `${item.s} <span>${item.n}</span>`;
      div.onclick = () => {
        document.getElementById('si').value = item.s;
        container.classList.remove('on');
      };
      grid = container.appendChild(div);
    });
    container.classList.add('on');
  } else {
    // Allow custom tracking entries cleanly if not indexed inside global database array directly
    const div = document.createElement('div');
    div.className = 's-item';
    div.innerHTML = `Use custom ticker: "${val.toUpperCase()}"`;
    div.onclick = () => {
      document.getElementById('si').value = val.toUpperCase();
      container.classList.remove('on');
    };
    container.appendChild(div);
    container.classList.add('on');
  }
}

function openModal(id = null) {
  editId = id;
  const m = document.getElementById('modal');
  const o = document.getElementById('overlay');
  const dBtn = document.getElementById('bdel');
  
  document.getElementById('sr').classList.remove('on');
  
  if (id) {
    document.getElementById('mt').textContent = 'Edit Asset';
    dBtn.style.display = 'block';
    const target = H.find(h => h.id === id);
    if (target) {
      document.getElementById('sm').value = target.market;
      document.getElementById('si').value = target.ticker;
      document.getElementById('sq').value = target.shares;
      document.getElementById('sp').value = target.buyPrice;
    }
  } else {
    document.getElementById('mt').textContent = 'Add Investment';
    dBtn.style.display = 'none';
    document.getElementById('si').value = '';
    document.getElementById('sq').value = '';
    document.getElementById('sp').value = '';
  }
  
  m.classList.add('on');
  o.classList.add('on');
}

function closeModal() {
  document.getElementById('modal').classList.remove('on');
  document.getElementById('overlay').classList.remove('on');
  editId = null;
}

function saveH() {
  const m = document.getElementById('sm').value;
  const t = document.getElementById('si').value.trim().toUpperCase();
  const q = parseFloat(document.getElementById('sq').value) || 0;
  const p = parseFloat(document.getElementById('sp').value) || 0;
  
  if (!t || q <= 0 || p <= 0) {
    toast('Please enter valid details', 'error');
    return;
  }
  
  // Resolve listing naming descriptor meta safely
  let nameStr = t;
  const combinedDb = [...DB.dfm, ...DB.adx, ...DB.india, ...DB.intl, ...DB.crypto];
  const matchedMeta = combinedDb.find(item => item.s.toUpperCase() === t);
  if (matchedMeta) nameStr = matchedMeta.n;

  if (editId) {
    // Edit existing block mapping mutations
    H = H.map(h => {
      if (h.id === editId) {
        h.market = m;
        h.ticker = t;
        h.name = nameStr;
        h.shares = q;
        h.buyPrice = p;
      }
      return h;
    });
    toast('Holding updated successfully');
  } else {
    // Fresh node push
    H.push({
      id: Date.now().toString(),
      market: m,
      ticker: t,
      name: nameStr,
      shares: q,
      buyPrice: p,
      livePrice: p // Instant safe initialization display default
    });
    toast('Asset added successfully');
  }
  
  sv();
  closeModal();
  render();
  
  // Trigger background updates instantly for the modified ticker sequence
  refreshPrices(false);
}

function delH() {
  if (editId) {
    H = H.filter(h => h.id !== editId);
    sv();
    closeModal();
    render();
    toast('Asset removed from portfolio');
  }
}

function setTab(tabName) {
  curTab = tabName;
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function mChg() {
  document.getElementById('si').value = '';
  document.getElementById('sr').innerHTML = '';
  document.getElementById('sr').classList.remove('on');
}

function toast(msg, type = 'success') {
  const e = document.getElementById('toast');
  e.textContent = msg;
  e.style.background = type === 'error' ? '#E05555' : '#5DBF7F';
  e.style.color = '#16120E';
  e.classList.add('on');
  setTimeout(() => { e.classList.remove('on'); }, 2500);
}

function bindUI() {
  document.getElementById('overlay').onclick = closeModal;
  document.getElementById('bcan').onclick = closeModal;
  document.getElementById('bsave').onclick = saveH;
  document.getElementById('si').oninput = function() { doSearch(this.value); };
}
</script>
</body>
</html>
