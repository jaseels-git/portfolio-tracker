    {src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%230D0D1A'/%3E%3Ctext x='256' y='340' font-size='280' text-anchor='middle'%3E%F0%9F%93%88%3C/text%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml"}

</script>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230D0D1A'/%3E%3Ctext x='90' y='125' font-size='95' text-anchor='middle'%3E%F0%9F%93%88%3C/text%3E%3C/svg%3E"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{--gold:#C9A84C;--gold-light:#E8C96A;--bg:#0D0D1A;--card:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.07);--green:#4CAF7D;--red:#E05555;--text:#fff;--muted:#888;--dim:#555;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;max-width:480px;margin:0 auto;min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 10%,rgba(201,168,76,.09) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(76,142,202,.07) 0%,transparent 55%);pointer-events:none;z-index:0}
#header{position:relative;z-index:10;background:linear-gradient(160deg,#12122A,#1A1A38);padding:calc(var(--safe-top) + 20px) 20px 22px;border-bottom:1px solid rgba(201,168,76,.18);display:flex;justify-content:space-between;align-items:flex-start}
.h-label{color:var(--gold);font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.h-value{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;letter-spacing:-.5px;line-height:1}
.h-sub{color:var(--muted);font-size:12px;margin-top:4px}
.h-pl{display:inline-block;padding:4px 11px;border-radius:20px;font-size:13px;font-weight:600}
.h-pl.pos{background:rgba(76,175,125,.15);color:var(--green)}.h-pl.neg{background:rgba(224,85,85,.15);color:var(--red)}
.h-pct{font-size:12px;margin-top:5px;text-align:right}
#nav{position:sticky;top:0;z-index:20;display:flex;background:#0e0e22;border-bottom:1px solid #1a1a38}
.nav-btn{flex:1;padding:13px 0;background:none;border:none;color:var(--dim);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.nav-icon{font-size:17px}
#main{position:relative;z-index:1;padding:16px 14px 120px}
.section{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:14px;animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.section-title{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:14px;font-weight:500}
#chartWrap{display:flex;align-items:center;gap:14px}
#pieCanvas{width:150px!important;height:150px!important;flex-shrink:0}
.legend-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.legend-left{display:flex;align-items:center;gap:8px}
.legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.legend-name{color:#ccc;font-size:12px}
.legend-pct{color:var(--text);font-size:12px;font-weight:600}
.legend-val{color:var(--dim);font-size:10px}
.summary-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sum-card{background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:14px;padding:12px}
.sum-label{color:var(--dim);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.sum-val{font-size:15px;font-weight:700}
.sum-sub{font-size:11px;color:var(--muted);margin-top:3px}
.top-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.top-row:last-child{border-bottom:none;padding-bottom:0}
.top-left{display:flex;align-items:center;gap:10px}
.mkt-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.card{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:18px;padding:15px;margin-bottom:12px;animation:fadeUp .25s ease both}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.mkt-badge{font-size:11px;border:1px solid;border-radius:7px;padding:2px 9px;letter-spacing:.8px;font-weight:500}
.card-actions{display:flex;gap:7px}
.icon-btn{background:rgba(255,255,255,.06);border:none;border-radius:8px;padding:5px 9px;cursor:pointer;font-size:13px}
.card-mid{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:13px}
.holding-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700}
.holding-sub{color:var(--dim);font-size:11px;margin-top:3px}
.holding-val{font-size:16px;font-weight:600;text-align:right}
.holding-aed{color:var(--dim);font-size:11px;margin-top:3px;text-align:right}
.pl-full{border-radius:12px;padding:12px 13px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.2)}
.pl-main{font-size:17px;font-weight:700}
.pl-aed{font-size:12px;margin-top:2px}
.pl-pct{font-size:14px;font-weight:700}
.info-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.info-box{background:rgba(0,0,0,.15);border:1px solid rgba(255,255,255,.05);border-radius:11px;padding:10px}
.info-label{color:var(--dim);font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.info-val{font-size:13px;font-weight:600}
.info-sub{font-size:10px;color:var(--muted);margin-top:2px}
.target-wrap{margin-bottom:10px;background:rgba(0,0,0,.15);border:1px solid rgba(255,255,255,.05);border-radius:11px;padding:11px}
.target-top{display:flex;justify-content:space-between;margin-bottom:8px}
.target-bar-bg{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.target-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.target-prices{display:flex;justify-content:space-between;margin-top:5px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.stat-box{background:rgba(0,0,0,.22);border-radius:10px;padding:9px 7px;text-align:center}
.stat-label{color:var(--dim);font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.stat-val{font-size:11px;font-weight:600}
.price-row{display:flex;align-items:center;gap:7px}
.update-btn{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);color:var(--gold);border-radius:9px;padding:7px 13px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.price-input{flex:1;background:rgba(255,255,255,.07);border:1px solid #2a2a45;border-radius:9px;padding:7px 11px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none}
.price-confirm{background:var(--green);border:none;border-radius:9px;padding:7px 12px;color:#000;cursor:pointer;font-weight:700}
.price-cancel{background:rgba(255,255,255,.07);border:none;border-radius:9px;padding:7px 12px;color:#aaa;cursor:pointer}
.mkt-summary{display:flex;justify-content:space-between;align-items:flex-start;background:rgba(0,0,0,.2);border-radius:11px;padding:12px;margin-bottom:13px}
.mkt-val{font-family:'Playfair Display',serif;font-size:20px;font-weight:700}
.mkt-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.mkt-row:last-child{border-bottom:none;padding-bottom:0}
#fab{position:fixed;bottom:calc(var(--safe-bottom) + 26px);right:20px;z-index:50;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-light));border:none;color:#000;font-size:30px;cursor:pointer;box-shadow:0 5px 28px rgba(201,168,76,.45);display:flex;align-items:center;justify-content:center;transition:transform .15s}
#fab:active{transform:scale(.93)}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;display:none;align-items:flex-end;backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}
#overlay.open{display:flex}
#modal{background:#12122A;border-radius:22px 22px 0 0;padding:24px 18px calc(var(--safe-bottom) + 32px);width:100%;border-top:1px solid rgba(201,168,76,.25);max-height:92dvh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.32,.72,0,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
.modal-title{color:var(--gold);font-family:'Playfair Display',serif;font-size:20px;margin-bottom:20px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.field{margin-bottom:15px}.field.full{grid-column:1/-1}
label{display:block;color:var(--dim);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:7px}
input[type=text],input[type=number]{width:100%;background:rgba(255,255,255,.06);border:1px solid #2A2A45;border-radius:11px;padding:11px 13px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none;appearance:none}
input:focus{border-color:rgba(201,168,76,.5)}
.pills{display:flex;flex-wrap:wrap;gap:7px}
.pill{padding:6px 13px;border-radius:20px;border:none;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;transition:all .15s;background:rgba(255,255,255,.07);color:#aaa}
.pill.s-dfm{background:#C9A84C;color:#000}.pill.s-adx{background:#4CAF7D;color:#000}
.pill.s-nse{background:#E8834C;color:#000}.pill.s-bse{background:#E84C7A;color:#fff}
.pill.s-international{background:#4C8ECA;color:#000}.pill.s-crypto{background:#B04CCA;color:#fff}
.pill.s-aed,.pill.s-usd,.pill.s-inr{background:var(--gold);color:#000}
.invested-hint{font-size:12px;color:var(--gold);margin-top:6px;grid-column:1/-1;min-height:18px}
.modal-btns{display:flex;gap:10px;margin-top:22px}
.btn-cancel{flex:1;padding:15px;background:rgba(255,255,255,.06);border:none;border-radius:13px;color:#aaa;font-size:15px;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-save{flex:2;padding:15px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border:none;border-radius:13px;color:#000;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
#toast{position:fixed;bottom:calc(var(--safe-bottom) + 100px);left:50%;transform:translateX(-50%) translateY(20px);padding:11px 26px;border-radius:22px;font-size:14px;font-weight:600;z-index:200;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#install-banner{display:none;position:fixed;bottom:calc(var(--safe-bottom) + 90px);left:14px;right:14px;z-index:90;background:linear-gradient(135deg,#1a1a38,#12122A);border:1px solid rgba(201,168,76,.3);border-radius:16px;padding:14px 16px;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#install-banner.show{display:flex}
.install-text{flex:1;font-size:13px;color:#ccc;line-height:1.4}.install-text strong{color:var(--gold)}
.install-btn{background:var(--gold);border:none;border-radius:10px;padding:9px 14px;color:#000;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif}
.install-close{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:4px}
.empty{text-align:center;padding:28px 0}.empty-icon{font-size:36px}.empty-text{color:var(--dim);font-size:13px;margin-top:9px}
.pos{color:var(--green)}.neg{color:var(--red)}
</style>
</head>
<body>
<div id="header">
  <div>
    <div class="h-label">My Portfolio</div>
    <div class="h-value" id="hVal">$0.00</div>
    <div class="h-sub" id="hAED">د.إ 0.00</div>
    <div class="h-sub" id="hInv" style="margin-top:2px">Invested: $0.00</div>
  </div>
  <div style="text-align:right">
    <div class="h-pl pos" id="hPL">▲ $0.00</div>
    <div class="h-pct pos" id="hPct">+0.00%</div>
    <div class="h-sub" id="hPLAED" style="margin-top:3px">▲ د.إ 0.00</div>
  </div>
</div>
<nav id="nav">
  <button class="nav-btn active" onclick="go('dashboard')" id="btn-dashboard"><span class="nav-icon">📊</span>Dashboard</button>
  <button class="nav-btn" onclick="go('holdings')" id="btn-holdings"><span class="nav-icon">📋</span>Holdings</button>
  <button class="nav-btn" onclick="go('markets')" id="btn-markets"><span class="nav-icon">🗺️</span>Markets</button>
</nav>
<main id="main"></main>
<button id="fab" onclick="openModal()">+</button>
<div id="overlay" onclick="bgClose(event)">
  <div id="modal">
    <div class="modal-title" id="mTitle">Add Holding</div>
    <div class="form-grid">
      <div class="field full"><label>Asset Name</label><input type="text" id="fName" placeholder="e.g. Reliance Industries"/></div>
      <div class="field"><label>Ticker</label><input type="text" id="fTicker" placeholder="e.g. RELIANCE"/></div>
      <div class="field"><label>Shares / Units</label><input type="number" id="fShares" placeholder="100" inputmode="decimal"/></div>
      <div class="field full">
        <label>Market</label>
        <div class="pills" id="mktPills">
          <button class="pill" onclick="selMkt('DFM')">🇦🇪 DFM</button>
          <button class="pill" onclick="selMkt('ADX')">🇦🇪 ADX</button>
          <button class="pill" onclick="selMkt('NSE')">🇮🇳 NSE</button>
          <button class="pill" onclick="selMkt('BSE')">🇮🇳 BSE</button>
          <button class="pill" onclick="selMkt('International')">🌐 Intl</button>
          <button class="pill" onclick="selMkt('Crypto')">₿ Crypto</button>
        </div>
      </div>
      <div class="field full">
        <label>Currency</label>
        <div class="pills" id="curPills">
          <button class="pill" onclick="selCur('AED')">AED د.إ</button>
          <button class="pill" onclick="selCur('USD')">USD $</button>
          <button class="pill" onclick="selCur('INR')">INR ₹</button>
        </div>
      </div>
      <div class="field">
        <label>Buy Price / share</label>
        <input type="number" id="fBuy" placeholder="0.00" inputmode="decimal"/>
      </div>
      <div class="field">
        <label>Current Price / share</label>
        <input type="number" id="fCur" placeholder="0.00" inputmode="decimal"/>
      </div>
      <div class="field full">
        <label>Target Sell Price <span style="color:#444;font-size:9px">(optional)</span></label>
        <input type="number" id="fTarget" placeholder="Leave blank if none" inputmode="decimal"/>
      </div>
      <div class="invested-hint" id="hint"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveH()">Add Holding</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<div id="install-banner">
  <div class="install-text"><strong>Add to Home Screen</strong><br/>Install for a native app experience</div>
  <button class="install-btn" id="installBtn">Install</button>
  <button class="install-close" onclick="document.getElementById('install-banner').classList.remove('show')">✕</button>
</div>
<script>
const AED_RATE=3.6725, INR_RATE=83.5;
const MARKETS=['DFM','ADX','NSE','BSE','International','Crypto'];
const COLORS={DFM:'#C9A84C',ADX:'#4CAF7D',NSE:'#E8834C',BSE:'#E84C7A',International:'#4C8ECA',Crypto:'#B04CCA'};
const FLAGS={DFM:'🇦🇪',ADX:'🇦🇪',NSE:'🇮🇳',BSE:'🇮🇳',International:'🌐',Crypto:'₿'};
const SYM={AED:'د.إ',USD:'$',INR:'₹'};
const KEY='portfolio-v5';
let H=[],tab='dashboard',editId=null,fMkt='DFM',fCur='AED',pieChart=null,editPrice=null,deferredPrompt=null;
const load=()=>{try{H=JSON.parse(localStorage.getItem(KEY)||'[]')}catch{H=[]}};
const save=()=>localStorage.setItem(KEY,JSON.stringify(H));
const n2=(n,loc='en-US')=>Math.abs(n).toLocaleString(loc,{minimumFractionDigits:2,maximumFractionDigits:2});
const fU=n=>'$'+n2(n);
const fA=n=>'د.إ '+n2(n);
const fR=n=>'₹'+n2(n,'en-IN');
const fP=n=>(n>=0?'+':'')+n.toFixed(2)+'%';
const fN=(n,c)=>c==='AED'?fA(n):c==='INR'?fR(n):fU(n);
const toUSD=(a,c)=>c==='AED'?a/AED_RATE:c==='INR'?a/INR_RATE:a;
function calc(h){
  const inv=h.buyPrice*h.shares, cur=h.currentPrice*h.shares;
  const invU=toUSD(inv,h.currency), curU=toUSD(cur,h.currency);
  const plU=curU-invU, plA=plU*AED_RATE;
  const plP=invU>0?(plU/invU)*100:0;
  let tPct=null,toT=null;
  if(h.targetPrice&&h.targetPrice>h.buyPrice){
    tPct=Math.min(Math.max(((h.currentPrice-h.buyPrice)/(h.targetPrice-h.buyPrice))*100,0),100);
    toT=((h.targetPrice-h.currentPrice)/h.currentPrice)*100;
  }
  return{invU,curU,inv,cur,plU,plA,plP,tPct,toT};
}
function tots(){
  const curU=H.reduce((s,h)=>s+calc(h).curU,0);
  const invU=H.reduce((s,h)=>s+calc(h).invU,0);
  const plU=curU-invU, plP=invU>0?(plU/invU)*100:0;
  return{curU,invU,plU,plP};
}
function hdr(){
  const t=tots(),pos=t.plU>=0;
  document.getElementById('hVal').textContent=fU(t.curU);
  document.getElementById('hAED').textContent=fA(t.curU*AED_RATE);
  document.getElementById('hInv').textContent='Invested: '+fU(t.invU);
  const pl=document.getElementById('hPL');
  pl.textContent=(pos?'▲ ':'▼ ')+fU(Math.abs(t.plU));
  pl.className='h-pl '+(pos?'pos':'neg');
  const pc=document.getElementById('hPct');
  pc.textContent=fP(t.plP)+' overall';
  pc.className='h-pct '+(pos?'pos':'neg');
  const pa=document.getElementById('hPLAED');
  pa.textContent=(pos?'▲ ':'▼ ')+fA(Math.abs(t.plU*AED_RATE));
  pa.style.color=pos?'var(--green)':'var(--red)';
}
function go(t){
  tab=t;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+t).classList.add('active');
  render();
}
function render(){
  hdr();
  const m=document.getElementById('main');
  if(tab==='dashboard') m.innerHTML=dash();
  else if(tab==='holdings') m.innerHTML=holdView();
  else m.innerHTML=mktView();
  if(tab==='dashboard') drawPie();
}
function dash(){
  const t=tots();
  const bm=MARKETS.map(m=>({name:m,v:H.filter(h=>h.market===m).reduce((s,h)=>s+calc(h).curU,0)})).filter(m=>m.v>0);
  const leg=bm.map(m=>`<div class="legend-row"><div class="legend-left"><div class="legend-dot" style="background:${COLORS[m.name]}"></div><span class="legend-name">${FLAGS[m.name]} ${m.name}</span></div><div><div class="legend-pct">${t.curU>0?((m.v/t.curU)*100).toFixed(1)+'%':'0%'}</div><div class="legend-val">${fU(m.v)}</div></div></div>`).join('');
  const pos=t.plU>=0;
  const sum=`<div class="summary-row">
    <div class="sum-card"><div class="sum-label">Total Invested</div><div class="sum-val">${fU(t.invU)}</div><div class="sum-sub">${fA(t.invU*AED_RATE)}</div></div>
    <div class="sum-card"><div class="sum-label">Total P&amp;L</div><div class="sum-val ${pos?'pos':'neg'}">${pos?'▲':'▼'} ${fU(Math.abs(t.plU))}</div><div class="sum-sub ${pos?'pos':'neg'}">${fP(t.plP)} · ${pos?'▲':'▼'} ${fA(Math.abs(t.plU*AED_RATE))}</div></div>
  </div>`;
  const top=[...H].sort((a,b)=>calc(b).curU-calc(a).curU).slice(0,5);
  const rows=top.map(h=>{const{curU,plP}=calc(h);return`<div class="top-row"><div class="top-left"><div class="mkt-dot" style="background:${COLORS[h.market]}"></div><div><div style="color:var(--text);font-weight:600;font-size:14px">${h.ticker||h.name}</div><div style="color:var(--dim);font-size:11px;margin-top:2px">${h.market}</div></div></div><div style="text-align:right"><div style="font-size:14px">${fU(curU)}</div><div class="${plP>=0?'pos':'neg'}" style="font-size:12px">${fP(plP)}</div></div></div>`;}).join('');
  return`${sum}<div class="section"><div class="section-title" style="color:var(--gold)">Allocation by Market</div>${bm.length===0?emp('Add your first holding'):`<div id="chartWrap"><canvas id="pieCanvas" width="150" height="150"></canvas><div id="legend">${leg}</div></div>`}</div><div class="section"><div class="section-title" style="color:var(--gold)">Top Holdings</div>${top.length===0?emp('No holdings yet'):rows}</div>`;
}
function drawPie(){
  const c=document.getElementById('pieCanvas');
  if(!c) return;
  if(pieChart){pieChart.destroy();pieChart=null;}
  const d=MARKETS.map(m=>({name:m,v:H.filter(h=>h.market===m).reduce((s,h)=>s+calc(h).curU,0)})).filter(m=>m.v>0);
  if(!d.length) return;
  pieChart=new Chart(c,{type:'doughnut',data:{labels:d.map(m=>m.name),datasets:[{data:d.map(m=>m.v),backgroundColor:d.map(m=>COLORS[m.name]),borderWidth:2,borderColor:'#0D0D1A',hoverOffset:4}]},options:{cutout:'62%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+fU(ctx.raw)},backgroundColor:'#1A1A35',titleColor:'#C9A84C',bodyColor:'#fff',borderColor:'#333',borderWidth:1,cornerRadius:10}},animation:{animateRotate:true,duration:600}}});
}
function holdView(){
  if(!H.length) return`<div class="section"><div class="section-title" style="color:var(--gold)">Holdings</div>${emp('Tap "+" to add your first holding')}</div>`;
  return H.map(h=>{
    const{curU,invU,inv,cur,plU,plA,plP,tPct,toT}=calc(h);
    const pos=plP>=0, sym=SYM[h.currency], ep=editPrice===h.id;
    const barColor=tPct>=100?'var(--green)':tPct>=60?'var(--gold)':'#4C8ECA';
    const tSec=h.targetPrice?`<div class="target-wrap">
      <div class="target-top">
        <span style="color:var(--dim);font-size:10px;letter-spacing:1px;text-transform:uppercase">Target Progress</span>
        <span style="font-size:11px;color:${barColor}">${toT!==null?(toT>=0?`+${toT.toFixed(1)}% to target`:'🎯 Target reached!'):'—'}</span>
      </div>
      <div class="target-bar-bg"><div class="target-bar-fill" style="width:${tPct||0}%;background:${barColor}"></div></div>
      <div class="target-prices">
        <span style="color:var(--dim);font-size:10px">Buy: ${sym}${h.buyPrice}</span>
        <span style="color:var(--dim);font-size:10px">Now: ${sym}${h.currentPrice}</span>
        <span style="color:${barColor};font-size:10px">Target: ${sym}${h.targetPrice}</span>
      </div>
    </div>`:'';
    return`<div class="card">
      <div class="card-top">
        <div class="mkt-badge" style="border-color:${COLORS[h.market]};color:${COLORS[h.market]}">${FLAGS[h.market]} ${h.market}</div>
        <div class="card-actions"><button class="icon-btn" onclick="editH('${h.id}')">✏️</button><button class="icon-btn" onclick="delH('${h.id}')">🗑️</button></div>
      </div>
      <div class="card-mid">
        <div><div class="holding-name">${h.name}</div><div class="holding-sub">${h.ticker} · ${h.shares} shares</div></div>
        <div><div class="holding-val">${fU(curU)}</div><div class="holding-aed">${fA(curU*AED_RATE)}</div></div>
      </div>
      <div class="pl-full" style="border-left:3px solid ${pos?'var(--green)':'var(--red)'}">
        <div>
          <div style="color:var(--dim);font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Profit / Loss</div>
          <div class="pl-main ${pos?'pos':'neg'}">${pos?'▲':'▼'} ${fU(Math.abs(plU))}</div>
          <div class="pl-aed ${pos?'pos':'neg'}">${pos?'▲':'▼'} ${fA(Math.abs(plA))}</div>
        </div>
        <div style="text-align:right"><div class="pl-pct ${pos?'pos':'neg'}">${fP(plP)}</div><div style="color:var(--dim);font-size:10px;margin-top:3px">return</div></div>
      </div>
      <div class="info-row">
        <div class="info-box">
          <div class="info-label">Total Invested</div>
          <div class="info-val">${fN(inv,h.currency)}</div>
          <div class="info-sub">${fU(invU)} · ${sym}${h.buyPrice}/sh</div>
        </div>
        <div class="info-box">
          <div class="info-label">Current Value</div>
          <div class="info-val">${fN(cur,h.currency)}</div>
          <div class="info-sub">${fU(curU)} · ${sym}${h.currentPrice}/sh</div>
        </div>
      </div>
      ${tSec}
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-label">Shares</div><div class="stat-val">${h.shares}</div></div>
        <div class="stat-box"><div class="stat-label">Buy Price</div><div class="stat-val">${sym}${h.buyPrice}</div></div>
        <div class="stat-box"><div class="stat-label">Target</div><div class="stat-val" style="color:${h.targetPrice?'var(--gold)':'var(--dim)'}">${h.targetPrice?sym+h.targetPrice:'—'}</div></div>
      </div>
      <div class="price-row" id="pr-${h.id}">
        ${ep?`<input class="price-input" id="pi-${h.id}" type="number" value="${h.currentPrice}" inputmode="decimal"/><button class="price-confirm" onclick="confP('${h.id}')">✓</button><button class="price-cancel" onclick="cancelP()">✕</button>`
            :`<button class="update-btn" onclick="startP('${h.id}')">🔄 Update Price (${sym}${h.currentPrice})</button>`}
      </div>
    </div>`;
  }).join('');
}
function mktView(){
  const t=tots();
  let html='';
  MARKETS.forEach(mkt=>{
    const mh=H.filter(h=>h.market===mkt);
    if(!mh.length) return;
    const mV=mh.reduce((s,h)=>s+calc(h).curU,0);
    const mI=mh.reduce((s,h)=>s+calc(h).invU,0);
    const mPL=mV-mI, mPLP=mI>0?(mPL/mI)*100:0, mPct=t.curU>0?(mV/t.curU)*100:0;
    const pos=mPL>=0;
    html+=`<div class="section">
      <div class="section-title" style="color:${COLORS[mkt]}">${FLAGS[mkt]} ${mkt}</div>
      <div class="mkt-summary">
        <div>
          <div class="mkt-val">${fU(mV)}</div>
          <div style="color:var(--dim);font-size:12px;margin-top:3px">${fA(mV*AED_RATE)}</div>
          <div style="color:var(--dim);font-size:11px;margin-top:3px">Invested: ${fU(mI)}</div>
        </div>
        <div style="text-align:right">
          <div style="color:${pos?'var(--green)':'var(--red)'};font-size:15px;font-weight:700">${pos?'▲':'▼'} ${fU(Math.abs(mPL))}</div>
          <div style="color:${pos?'var(--green)':'var(--red)'};font-size:12px;margin-top:3px">${fP(mPLP)}</div>
          <div style="color:var(--dim);font-size:11px;margin-top:3px">${mPct.toFixed(1)}% of portfolio</div>
        </div>
      </div>
      ${mh.map(h=>{const{curU,plP}=calc(h);const sym=SYM[h.currency];return`<div class="mkt-row"><div><div style="color:var(--text);font-size:14px;font-weight:500">${h.name}</div><div style="color:var(--dim);font-size:11px;margin-top:2px">${h.ticker} · ${h.shares} sh · Buy: ${sym}${h.buyPrice}${h.targetPrice?' · Target: '+sym+h.targetPrice:''}</div></div><div style="text-align:right"><div style="color:#ddd;font-size:13px">${fU(curU)}</div><div class="${plP>=0?'pos':'neg'}" style="font-size:12px">${fP(plP)}</div></div></div>`;}).join('')}
    </div>`;
  });
  if(!html) html=`<div class="section"><div class="section-title" style="color:var(--gold)">Markets</div>${emp('No holdings yet')}</div>`;
  return html;
}
function emp(msg){return`<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">${msg}</div></div>`;}
function openModal(id=null){
  editId=id;
  document.getElementById('mTitle').textContent=id?'Edit Holding':'Add Holding';
  document.querySelector('.btn-save').textContent=id?'Update':'Add Holding';
  if(id){
    const h=H.find(x=>x.id===id);
    document.getElementById('fName').value=h.name;
    document.getElementById('fTicker').value=h.ticker;
    document.getElementById('fShares').value=h.shares;
    document.getElementById('fBuy').value=h.buyPrice;
    document.getElementById('fCur').value=h.currentPrice;
    document.getElementById('fTarget').value=h.targetPrice||'';
    selMkt(h.market); selCur(h.currency);
  } else {
    ['fName','fTicker','fShares','fBuy','fCur','fTarget'].forEach(i=>document.getElementById(i).value='');
    selMkt('DFM'); selCur('AED');
  }
  upHint();
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('fName').focus(),300);
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function bgClose(e){if(e.target===document.getElementById('overlay'))closeModal();}
function selMkt(m){
  fMkt=m;
  document.querySelectorAll('#mktPills .pill').forEach(p=>{
    p.className='pill';
    const txt=p.textContent;
    if(m==='International'&&txt.includes('Intl')) p.classList.add('s-international');
    else if(txt.includes(m)) p.classList.add('s-'+m.toLowerCase());
  });
}
function selCur(c){
  fCur=c;
  document.querySelectorAll('#curPills .pill').forEach(p=>{p.className='pill';if(p.textContent.includes(c))p.classList.add('s-'+c.toLowerCase());});
  upHint();
}
function upHint(){
  const sh=parseFloat(document.getElementById('fShares').value)||0;
  const bp=parseFloat(document.getElementById('fBuy').value)||0;
  const h=document.getElementById('hint');
  if(sh&&bp){const t=sh*bp;h.textContent=`Total invested: ${SYM[fCur]||'$'}${t.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`;}
  else h.textContent='';
}
document.getElementById('fShares').addEventListener('input',upHint);
document.getElementById('fBuy').addEventListener('input',upHint);
function saveH(){
  const name=document.getElementById('fName').value.trim();
  const ticker=document.getElementById('fTicker').value.trim().toUpperCase();
  const shares=parseFloat(document.getElementById('fShares').value);
  const buyPrice=parseFloat(document.getElementById('fBuy').value);
  const currentPrice=parseFloat(document.getElementById('fCur').value);
  const targetPrice=parseFloat(document.getElementById('fTarget').value)||null;
  if(!name||!shares||!buyPrice||!currentPrice){toast('Please fill all required fields','error');return;}
  const e={id:editId||Math.random().toString(36).slice(2,9),name,ticker,market:fMkt,shares,buyPrice,currentPrice,targetPrice,currency:fCur};
  if(editId) H=H.map(h=>h.id===editId?e:h); else H.push(e);
  save(); closeModal(); render(); toast(editId?'Updated!':'Holding added!');
}
function editH(id){openModal(id);}
function delH(id){if(!confirm('Remove this holding?'))return;H=H.filter(h=>h.id!==id);save();render();toast('Removed');}
function startP(id){editPrice=id;render();const i=document.getElementById('pi-'+id);if(i){i.focus();i.select();}}
function cancelP(){editPrice=null;render();}
function confP(id){const v=parseFloat(document.getElementById('pi-'+id)?.value);if(!isNaN(v)&&v>0){H=H.map(h=>h.id===id?{...h,currentPrice:v}:h);save();}editPrice=null;render();toast('Price updated!');}
function toast(msg,type='success'){const e=document.getElementById('toast');e.textContent=msg;e.style.background=type==='error'?'var(--red)':'var(--green)';e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200);}
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;document.getElementById('install-banner').classList.add('show');});
document.getElementById('installBtn').addEventListener('click',async()=>{if(!deferredPrompt)return;deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;document.getElementById('install-banner').classList.remove('show');});
if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!navigator.standalone&&!localStorage.getItem('ios-h')){setTimeout(()=>{toast('Tap Share → Add to Home Screen to install!');localStorage.setItem('ios-h','1');},2500);}
if('serviceWorker' in navigator){const sw=`const C='pf-v5';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll([self.location.href]))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'text/javascript'}))).catch(()=>{});}
load(); render();
</script>
</body>
</html>
