<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8"/>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>

<meta name="apple-mobile-web-app-capable" content="yes"/>

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<meta name="apple-mobile-web-app-title" content="Portfolio"/>

<meta name="theme-color" content="#16120E"/>

<title>Portfolio</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:rgba(0,0,0,0)}

:root{

  --bg:#16120E;--bg2:#1E1814;--bg3:#252018;

  --card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);

  --gold:#D4A847;--gold2:#F0C85A;--gold-dim:rgba(212,168,71,0.15);

  --green:#5DBF7F;--red:#E05555;

  --text:#F2EDE4;--muted:#8C8070;--dim:#5A5040;

  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);

}

html,body{height:100%;width:100%;overflow-x:hidden}

body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;max-width:480px;margin:0 auto;-webkit-font-smoothing:antialiased}

 

/* Warm ambient glow */

body::before{content:'';position:fixed;inset:0;

background:

    radial-gradient(ellipse at 50% -10%,rgba(212,168,71,.12) 0%,transparent 60%),

    radial-gradient(ellipse at 100% 100%,rgba(180,100,60,.08) 0%,transparent 50%),

    radial-gradient(ellipse at 0% 80%,rgba(60,80,120,.06) 0%,transparent 50%);

pointer-events:none;z-index:0}

 

/* ── HEADER ── */

#hdr{

  position:relative;z-index:5;

  padding:calc(var(--sat) + 20px) 20px 0;

  background:linear-gradient(180deg,#1E1814 0%,transparent 100%);

}

.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}

.hdr-logo{display:flex;align-items:center;gap:8px}

.hdr-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}

.hdr-logo-text{color:var(--gold);font-size:12px;letter-spacing:3px;text-transform:uppercase;font-weight:500}

.hdr-refresh{background:rgba(212,168,71,.12);border:1px solid rgba(212,168,71,.25);color:var(--gold);border-radius:10px;padding:6px 12px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px}

.rtime{color:var(--dim);font-size:10px;margin-top:2px;text-align:right}

 

/* ── DONUT CHART SECTION ── */

#chart-section{

  position:relative;z-index:1;

  padding:10px 20px 0;

  display:flex;flex-direction:column;align-items:center;

}

#chart-wrap{position:relative;width:220px;height:220px;margin:0 auto}

#chartCanvas{width:220px!important;height:220px!important}

.chart-center{

  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);

  text-align:center;pointer-events:none;

}

.chart-center-label{color:var(--muted);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}

.chart-center-val{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--text);line-height:1}

.chart-center-aed{color:var(--muted);font-size:11px;margin-top:3px}

 

/* ── STATS ROW BELOW CHART ── */

.stats-strip{

  display:flex;justify-content:space-between;

  padding:14px 20px;gap:8px;

  border-bottom:1px solid rgba(255,255,255,.05);

}

.stat-item{flex:1;text-align:center}

.stat-lbl{color:var(--dim);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}

.stat-val{font-size:14px;font-weight:600;color:var(--text)}

.stat-sub{font-size:10px;color:var(--muted);margin-top:2px}

 

/* ── NAV ── */

#nav{

  position:sticky;top:0;z-index:20;

  display:flex;background:var(--bg2);

  border-bottom:1px solid rgba(255,255,255,.06);

  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);

}

.nb{

  flex:1;padding:13px 0;background:none;border:none;

  border-bottom:2px solid transparent;

  color:var(--dim);font-size:11px;cursor:pointer;

  font-family:'DM Sans',sans-serif;

  display:flex;flex-direction:column;align-items:center;gap:3px;

  -webkit-appearance:none;transition:color .2s,border-color .2s;

  letter-spacing:.5px;text-transform:uppercase;

}

.nb.on{color:var(--gold);border-bottom-color:var(--gold)}

.ni{font-size:16px}

 

/* ── MAIN ── */

#main{position:relative;z-index:1;padding:16px 16px 110px}

 

/* ── LEGEND PILLS (market allocation) ── */

.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}

.legend-pill{

  display:flex;align-items:center;gap:8px;

  background:var(--card);border:1px solid var(--border);

  border-radius:12px;padding:9px 11px;

}

.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

.legend-name{color:var(--muted);font-size:11px;flex:1}

.legend-pct{color:var(--text);font-size:12px;font-weight:600}

.legend-val{color:var(--dim);font-size:10px}

 

/* ── MARKET TABS ── */

.mkt-tabs-wrap{margin-bottom:14px}

.mkt-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}

.mkt-tabs::-webkit-scrollbar{display:none}

.mkt-tab{

  flex-shrink:0;

  background:var(--card);border:1px solid var(--border);

  border-radius:14px;padding:10px 14px;

  cursor:pointer;font-family:'DM Sans',sans-serif;

  transition:all .2s;text-align:left;min-width:110px;

}

.mkt-tab.on{border-color:rgba(212,168,71,.5);background:rgba(212,168,71,.08)}

.mkt-tab-top{display:flex;align-items:center;gap:6px;margin-bottom:6px}

.mkt-tab-flag{font-size:14px}

.mkt-tab-name{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}

.mkt-tab.on .mkt-tab-name{color:var(--gold)}

.mkt-tab-val{font-size:14px;font-weight:700;color:var(--text)}

.mkt-tab-pl{font-size:10px;margin-top:2px}

 

/* ── MARKET TOTAL BAR ── */

.mkt-total{

  background:linear-gradient(135deg,rgba(212,168,71,.08),rgba(212,168,71,.03));

  border:1px solid rgba(212,168,71,.2);

  border-radius:14px;padding:13px 15px;margin-bottom:13px;

  display:flex;justify-content:space-between;align-items:center;

}

.mkt-total-label{color:var(--muted);font-size:9px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}

.mkt-total-val{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--text)}

.mkt-total-sub{color:var(--dim);font-size:11px;margin-top:2px}

.mkt-total-pl{text-align:right}

.mkt-total-pl-val{font-size:16px;font-weight:700}

.mkt-total-pl-pct{font-size:12px;margin-top:3px}

.mkt-total-invested{color:var(--dim);font-size:10px;margin-top:3px}

 

/* ── DASH STOCK ROW ── */

.dsr{

  display:flex;justify-content:space-between;align-items:center;

  padding:11px 0;border-bottom:1px solid rgba(255,255,255,.04);

  cursor:pointer;

}

.dsr:last-child{border-bottom:none;padding-bottom:2px}

.dsr:active{opacity:.7}

.dsi{

  width:38px;height:38px;border-radius:11px;

  display:flex;align-items:center;justify-content:center;

  font-size:13px;font-weight:700;flex-shrink:0;

}

.dsname{color:var(--text);font-size:13px;font-weight:600;line-height:1.2}

.dssub{color:var(--dim);font-size:10px;margin-top:3px}

.dsval{color:var(--text);font-size:13px;font-weight:600;text-align:right}

.dspl{font-size:11px;margin-top:2px;text-align:right}

.dsaed{color:var(--dim);font-size:10px;margin-top:1px;text-align:right}

 

/* ── HOLDING CARD ── */

.card{

  background:var(--bg2);

  border:1px solid var(--border);

  border-radius:18px;padding:15px;margin-bottom:11px;

}

.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}

.mbadge{font-size:10px;border:1px solid;border-radius:7px;padding:2px 9px;letter-spacing:.8px;font-weight:500}

.lbadge{font-size:9px;background:rgba(93,191,127,.12);color:var(--green);border-radius:5px;padding:2px 6px;margin-left:5px}

.acts{display:flex;gap:6px}

.ibtn{background:rgba(255,255,255,.05);border:none;border-radius:8px;padding:5px 9px;cursor:pointer;font-size:12px;-webkit-appearance:none}

.cmid{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:13px}

.hn{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--text)}

.hsb{color:var(--dim);font-size:11px;margin-top:3px}

.hv{font-size:15px;font-weight:600;text-align:right;color:var(--text)}

.ha{color:var(--dim);font-size:11px;margin-top:2px;text-align:right}

 

/* P&L BOX */

.plbox{

  border-radius:13px;padding:12px 14px;margin-bottom:10px;

  display:flex;justify-content:space-between;align-items:center;

  background:rgba(0,0,0,.2);

}

.plm{font-size:16px;font-weight:700}

.pla{font-size:11px;margin-top:2px}

.plp{font-size:14px;font-weight:700}

 

/* INFO ROW */

.irow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}

.ibox{background:rgba(0,0,0,.15);border:1px solid rgba(255,255,255,.05);border-radius:11px;padding:10px}

.ilbl{color:var(--dim);font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}

.ival{font-size:12px;font-weight:600;color:var(--text)}

.isub{font-size:10px;color:var(--muted);margin-top:2px}

 

/* TARGET */

.twrap{margin-bottom:10px;background:rgba(0,0,0,.15);border:1px solid rgba(255,255,255,.05);border-radius:11px;padding:10px}

.tbg{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin:6px 0 5px}

.tfill{height:100%;border-radius:3px;transition:width .5s}

 

/* STATS GRID */

.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}

.sbox{background:rgba(0,0,0,.2);border-radius:10px;padding:9px 6px;text-align:center}

.slbl{color:var(--dim);font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}

.sval{font-size:11px;font-weight:600;color:var(--text)}

 

/* PRICE ROW */

.upbtn{background:var(--gold-dim);border:1px solid rgba(212,168,71,.3);color:var(--gold);border-radius:9px;padding:7px 12px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-appearance:none}

.pinput{flex:1;background:rgba(255,255,255,.06);border:1px solid #3A3020;border-radius:9px;padding:7px 10px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}

.pok{background:var(--green);border:none;border-radius:9px;padding:7px 11px;color:#000;cursor:pointer;font-weight:700;-webkit-appearance:none}

.pcan{background:rgba(255,255,255,.06);border:none;border-radius:9px;padding:7px 11px;color:var(--muted);cursor:pointer;-webkit-appearance:none}

 

/* MARKETS TAB VIEW */

.msumm{display:flex;justify-content:space-between;align-items:flex-start;background:rgba(0,0,0,.2);border-radius:12px;padding:13px;margin-bottom:13px}

.mrow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}

.mrow:last-child{border-bottom:none}

 

/* FAB */

#fab{

  position:fixed;bottom:calc(var(--sab) + 24px);right:18px;z-index:999;

  width:56px;height:56px;border-radius:50%;

  background:linear-gradient(135deg,var(--gold),var(--gold2));

  border:none;color:#1A1410;font-size:26px;font-weight:400;

  display:flex;align-items:center;justify-content:center;

  box-shadow:0 6px 30px rgba(212,168,71,.45);

  cursor:pointer;-webkit-appearance:none;touch-action:manipulation;

}

 

/* MODAL */

#overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0);pointer-events:none;transition:background .25s}

#overlay.on{background:rgba(0,0,0,.88);pointer-events:all;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}

#modal{

  position:fixed;bottom:0;left:50%;

  transform:translateX(-50%) translateY(100%);

  width:100%;max-width:480px;

  background:var(--bg2);

  border-radius:24px 24px 0 0;

  border-top:1px solid rgba(212,168,71,.2);

  padding:22px 18px calc(var(--sab) + 28px);

  max-height:93vh;overflow-y:auto;

  transition:transform .32s cubic-bezier(.32,.72,0,1);

  z-index:10000;-webkit-overflow-scrolling:touch;

}

#modal.on{transform:translateX(-50%) translateY(0)}

.mtitle{color:var(--gold);font-family:'Playfair Display',serif;font-size:20px;margin-bottom:18px}

.slbl2{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:8px;display:block}

.pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}

.pill{padding:7px 13px;border-radius:20px;border:1px solid rgba(255,255,255,.1);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;background:rgba(255,255,255,.04);color:var(--muted);-webkit-appearance:none;touch-action:manipulation}

.pill.on{color:#1A1410;border-color:transparent}

.srchwrap{position:relative;margin-bottom:12px}

.srch{width:100%;background:rgba(255,255,255,.06);border:1px solid #3A3020;border-radius:12px;padding:12px 38px 12px 14px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}

.srch:focus{border-color:rgba(212,168,71,.5)}

.sicon{position:absolute;right:14px;top:14px;color:var(--dim);font-size:16px}

.res-wrap{max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:12px;background:rgba(0,0,0,.15);margin-bottom:18px}

.res-item{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.03);display:flex;justify-content:space-between;align-items:center;cursor:pointer}

.res-item:last-child{border-bottom:none}

.res-item:active{background:rgba(255,255,255,.03)}

.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}

.fg{display:flex;flex-direction:column}

.finput{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:11px 12px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}

.finput:focus{border-color:rgba(212,168,71,.3)}

.mbtns{display:flex;gap:10px;margin-top:10px}

.mbtn{flex:1;padding:13px 0;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-appearance:none}

#bsave{background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;color:#1A1410}

#bcan{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted)}

 

/* TOAST */

#toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-100px);background:#5DBF7F;color:#120E0B;padding:10px 20px;border-radius:30px;font-size:12px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.5);z-index:99999;transition:transform .3s cubic-bezier(.175,.885,.32,1.275);pointer-events:none}

#toast.on{transform:translateX(-50%) translateY(0)}

 

/* MISC */

.green{color:var(--green)!important}

.red{color:var(--red)!important}

::-webkit-scrollbar{width:4px;height:4px}

::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

 

<div id="hdr">

  <div class="hdr-top">

    <div class="hdr-logo">

      <div class="hdr-logo-icon">⚜</div>

      <div class="hdr-logo-text">Aurelius</div>

    </div>

    <button class="hdr-refresh" id="rb" onclick="refreshPrices(true)">🔄 Refresh</button>

  </div>

  <div class="rtime" id="rl">just now</div>

</div>

 

<div id="chart-section">

  <div id="chart-wrap">

    <canvas id="chartCanvas"></canvas>

    <div class="chart-center">

      <div class="chart-center-label">Net Asset</div>

      <div class="chart-center-val" id="net-val">0</div>

      <div class="chart-center-aed">AED</div>

    </div>

  </div>

</div>

 

<div class="stats-strip">

  <div class="stat-item">

    <div class="stat-lbl">Invested</div>

    <div class="stat-val" id="tot-inv">0</div>

  </div>

  <div class="stat-item" style="border-left:1px solid rgba(255,255,255,.04);border-right:1px solid rgba(255,255,255,.04)">

    <div class="stat-lbl">Total Profit</div>

    <div class="stat-val" id="tot-pl">0</div>

  </div>

  <div class="stat-item">

    <div class="stat-lbl">24h Change</div>

    <div class="stat-val" id="tot-24">0.00%</div>

  </div>

</div>

 

<div id="nav">

  <button class="nb on" onclick="setTab('dash')"><span class="ni">📋</span>Dashboard</button>

  <button class="nb" onclick="setTab('hold')"><span class="ni">💼</span>Holdings</button>

  <button class="nb" onclick="setTab('mkt')"><span class="ni">🌍</span>Markets</button>

</div>

 

<div id="main"></div>

 

<button id="fab" onclick="openModal()">+</button>

 

<div id="overlay"></div>

<div id="modal">

  <div class="mtitle" id="mtitle">Add Asset</div>

 

  <span class="slbl2">Select Asset Class / Market</span>

  <div class="pills" id="mktpills">

    <div class="pill on" data-v="DFM" onclick="chPill(this)">🇦🇪 DFM</div>

    <div class="pill" data-v="ADX" onclick="chPill(this)">🇦🇪 ADX</div>

    <div class="pill" data-v="International" onclick="chPill(this)">🇺🇸 International</div>

    <div class="pill" data-v="India" onclick="chPill(this)">🇮🇳 India</div>

    <div class="pill" data-v="Crypto" onclick="chPill(this)">🪙 Crypto</div>

  </div>

 

  <span class="slbl2">Search Name or Symbol</span>

  <div class="srchwrap">

    <input type="text" class="srch" id="si" placeholder="Type Emaar, Apple, Reliance..."/>

    <span class="sicon">🔍</span>

  </div>

 

  <div class="res-wrap" id="sres" style="display:none"></div>

 

  <div class="fgrid">

    <div class="fg">

      <span class="slbl2">Shares Owned</span>

      <input type="number" step="any" class="finput" id="fsh" placeholder="0.00"/>

    </div>

    <div class="fg">

      <span class="slbl2">Avg Price</span>

      <input type="number" step="any" class="finput" id="fpr" placeholder="0.00"/>

    </div>

  </div>

 

  <div class="fgrid" style="margin-top:-8px">

    <div class="fg">

      <span class="slbl2">Custom Name (Opt)</span>

      <input type="text" class="finput" id="fcn" placeholder="e.g. My Emaar Share"/>

    </div>

    <div class="fg">

      <span class="slbl2">Target Allocation %</span>

      <input type="number" class="finput" id="ftg" placeholder="10"/>

    </div>

  </div>

 

  <div class="mbtns">

    <button class="mbtn" id="bcan">Cancel</button>

    <button class="mbtn" id="bsave">Save Holding</button>

  </div>

</div>

 

<div id="toast">Updated successfully ✓</div>

 

<script>

// Global State & Core Properties [cite: 32]

let H = [];

let curTab = 'dash';

let chartObj = null;

let lastRfr = null;

let selStock = null;

let editId = null;

 

// FX Multipliers against base currency (AED)

const FX = { AED:1, USD:3.6725, INR:0.044, OMR:9.54, SAR:0.98, EUR:3.95 };

 

// Built-in Database references for the custom lookup matrix

const DB = {

  DFM: [

    {symbol:'EMAAR.DU',name:'Emaar Properties'}, {symbol:'ENBD.DU',name:'Emirates NBD'},

    {symbol:'DIB.DU',name:'Dubai Islamic Bank'}, {symbol:'DEWA.DU',name:'DEWA'},

    {symbol:'DFM.DU',name:'Dubai Financial Market'}, {symbol:'SALIK.DU',name:'Salik Company'},

    {symbol:'PARKIN.DU',name:'Parkin Company'}, {symbol:'AIRARABIA.DU',name:'Air Arabia'}

  ],

  ADX: [

    {symbol:'IHC.AD',name:'International Holding Co'}, {symbol:'FAB.AD',name:'First Abu Dhabi Bank'},

    {symbol:'ADNOCDIST.AD',name:'ADNOC Distribution'}, {symbol:'ALDAR.AD',name:'Aldar Properties'},

    {symbol:'BOROUGE.AD',name:'Borouge'}, {symbol:'MULTIPLY.AD',name:'Multiply Group'}

  ],

  International: [

    {symbol:'AAPL',name:'Apple Inc'}, {symbol:'MSFT',name:'Microsoft Corp'},

    {symbol:'NVDA',name:'NVIDIA Corporation'}, {symbol:'TSLA',name:'Tesla Inc'},

    {symbol:'AMZN',name:'Amazon.com Inc'}, {symbol:'GOOGL',name:'Alphabet Inc'}

  ],

  India: [

    {symbol:'RELIANCE.NS',name:'Reliance Industries'}, {symbol:'TCS.NS',name:'Tata Consultancy'},

    {symbol:'INFY.NS',name:'Infosys Limited'}, {symbol:'HDFCBANK.NS',name:'HDFC Bank Ltd'},

    {symbol:'ICICIBANK.NS',name:'ICICI Bank Ltd'}

  ],

  Crypto: [

    {symbol:'crypto:bitcoin',name:'Bitcoin'}, {symbol:'crypto:ethereum',name:'Ethereum'},

    {symbol:'crypto:solana',name:'Solana'}, {symbol:'crypto:ripple',name:'Ripple'}

  ]

};

 

const M_META = {

  DFM: { f:'🇦🇪', c:'AED' },

  ADX: { f:'🇦🇪', c:'AED' },

  International: { f:'🇺🇸', c:'USD' },

  India: { f:'🇮🇳', c:'INR' },

  Crypto: { f:'🪙', c:'USD' }

};

 

// Initial Setup Handler

window.onload = function() {

  initData();

  bindUI();

  refreshPrices(false);

  setInterval(upRlbl, 30000);

};

 

function initData() {

  const local = localStorage.getItem('aur_port_h');

  if (local) {

    try { H = JSON.parse(local); } catch(e) { H = []; }

  } else {

    // Inject seed configuration default mock if local storage is fresh

    H = [

      { id:'1', market:'DFM', symbol:'EMAAR.DU', name:'Emaar Properties', shares:1200, avgPrice:8.10, livePrice:8.45, change24h:1.2, targetPct:25 },

      { id:'2', market:'International', symbol:'NVDA', name:'NVIDIA Corporation', shares:15, avgPrice:115, livePrice:122.40, change24h:-2.4, targetPct:35 },

      { id:'3', market:'India', symbol:'RELIANCE.NS', name:'Reliance Industries', shares:40, avgPrice:2450, livePrice:2510, change24h:0.4, targetPct:20 }

    ];

    sv();

  }

}

 

function sv() { localStorage.setItem('aur_port_h', JSON.stringify(H)); }

 

// Core Fixed Live Price Synchronizer Mapping Context [cite: 30, 31, 32]

async function refreshPrices(manual = false) {

  const rb = document.getElementById('rb');

  if (rb) {

    rb.disabled = true;

    rb.textContent = '⏳ Fetching...';

  }

 

  try {

    // Isolate unique tickers loaded into the active portfolio asset array [cite: 32]

    const tickers = [...new Set(H.map(h => h.symbol).filter(Boolean))];

   

    if (tickers.length === 0) {

      if (manual) toast('No tickers found to update.', 'error');

      calcTotals();

      render();

      return;

    }

 

    // Connects matching your custom API endpoint tree deployment structures [cite: 30, 31, 32]

    const response = await fetch(`/api/prices?stocks=${encodeURIComponent(tickers.join(','))}`);

    if (!response.ok) throw new Error('API Response Error');

   

    const priceData = await response.json();

 

    // Map responses sequentially against your local portfolio state values [cite: 32]

    H = H.map(h => {

      const liveData = priceData[h.symbol];

      if (liveData) {

        h.livePrice = liveData.price;

        h.change24h = liveData.change24h;

      }

      return h;

    });

 

    sv(); // Cache tracking changes to LocalStorage [cite: 32]

    lastRfr = new Date();

    upRlbl(); // Re-index elapsed timing stamps [cite: 32]

    calcTotals();

    render(); // Redraw UI graphs and layout updates [cite: 32]

   

    const updatedCount = H.filter(h => h.livePrice).length;

    if (manual) toast(`Updated ${updatedCount}/${H.length} assets successfully ✓`);

   

  } catch (e) {

    console.error('Error fetching live data:', e);

    if (manual) toast('Could not fetch live market prices', 'error');

    calcTotals();

    render();

  } finally {

    if (rb) {

      rb.disabled = false;

      rb.textContent = '🔄 Refresh';

    }

  }

}

 

// Math Matrix Calculations & Allocations

let totValueAED = 0, totCostAED = 0, dayChangeAED = 0;

let mAlloc = { DFM:0, ADX:0, International:0, India:0, Crypto:0 };

 

function calcTotals() {

  totValueAED = 0; totCostAED = 0; dayChangeAED = 0;

  mAlloc = { DFM:0, ADX:0, International:0, India:0, Crypto:0 };

 

  H.forEach(h => {

    const fx = FX[M_META[h.market].c] || 1;

    const costAED = h.shares * h.avgPrice * fx;

    const price = h.livePrice || h.avgPrice;

    const valAED = h.shares * price * fx;

   

    totCostAED += costAED;

    totValueAED += valAED;

    mAlloc[h.market] += valAED;

 

    if (h.change24h) {

      const pct = h.change24h / 100;

      dayChangeAED += (valAED * pct) / (1 + pct);

    }

  });

}

 

function upRlbl() {

  const el = document.getElementById('rl');

  if (!el || !lastRfr) return;

  const m = Math.round((Date.now() - lastRfr) / 60000);

  el.textContent = m === 0 ? 'just now' : m + 'm ago';

}

 

function setTab(t) {

  curTab = t;

  const buttons = document.querySelectorAll('#nav .nb');

  buttons[0].classList.toggle('on', t === 'dash');

  buttons[1].classList.toggle('on', t === 'hold');

  buttons[2].classList.toggle('on', t === 'mkt');

  render();

}

 

function render() {

  document.getElementById('net-val').textContent = formatNum(totValueAED, 0);

  document.getElementById('tot-inv').textContent = formatNum(totCostAED, 0) + ' AED';

 

  const pl = totValueAED - totCostAED;

  const plEl = document.getElementById('tot-pl');

  plEl.textContent = (pl >= 0 ? '+' : '') + formatNum(pl, 0) + ' AED';

  plEl.className = 'stat-val ' + (pl >= 0 ? 'green' : 'red');

 

  const chg24El = document.getElementById('tot-24');

  if (totValueAED > 0) {

    const pct24 = (dayChangeAED / totValueAED) * 100;

    chg24El.textContent = (pct24 >= 0 ? '+' : '') + pct24.toFixed(2) + '%';

    chg24El.className = 'stat-val ' + (pct24 >= 0 ? 'green' : 'red');

  } else {

    chg24El.textContent = '0.00%';

    chg24El.className = 'stat-val';

  }

 

  drawChart();

 

  const main = document.getElementById('main');

  main.innerHTML = '';

 

  if (curTab === 'dash') renderDash(main);

  else if (curTab === 'hold') renderHold(main);

  else if (curTab === 'mkt') renderMkt(main);

}

 

function drawChart() {

  const ctx = document.getElementById('chartCanvas').getContext('2d');

  const dataVals = [mAlloc.DFM, mAlloc.ADX, mAlloc.International, mAlloc.India, mAlloc.Crypto];

  const colors = ['#D4A847', '#A3C6C4', '#4A90E2', '#E2844A', '#A569BD'];

 

  if (chartObj) {

    chartObj.data.datasets[0].data = dataVals;

    chartObj.update();

  } else {

    chartObj = new Chart(ctx, {

      type: 'doughnut',

      data: {

        labels: ['DFM', 'ADX', 'International', 'India', 'Crypto'],

        datasets: [{

          data: dataVals,

          backgroundColor: colors,

          borderWidth: 0,

          hoverOffset: 4

        }]

      },

      options: {

        plugins: { legend: { display: false } },

        cutout: '84%',

        responsive: true,

        maintainAspectRatio: false

      }

    });

  }

}

 

function renderDash(el) {

  let htm = '<div class="legend-grid">';

  const labels = ['DFM', 'ADX', 'International', 'India', 'Crypto'];

  const colors = ['#D4A847', '#A3C6C4', '#4A90E2', '#E2844A', '#A569BD'];

 

  labels.forEach((l, i) => {

    const val = mAlloc[l];

    const pct = totValueAED > 0 ? (val / totValueAED) * 100 : 0;

    htm += `

      <div class="legend-pill">

        <div class="legend-dot" style="background:${colors[i]}"></div>

        <div class="legend-name">${l}</div>

        <div style="text-align:right">

          <div class="legend-pct">${pct.toFixed(1)}%</div>

          <div class="legend-val">${formatNum(val, 0)} AED</div>

        </div>

      </div>`;

  });

  htm += '</div><h3 style="font-family:\'Playfair Display\',serif;margin:22px 0 12px;font-size:18px;color:var(--gold)">Top Positions</h3>';

 

  const sorted = [...H].sort((a,b) => {

    const va = a.shares * (a.livePrice || a.avgPrice) * (FX[M_META[a.market].c]||1);

    const vb = b.shares * (b.livePrice || b.avgPrice) * (FX[M_META[b.market].c]||1);

    return vb - va;

  });

 

  if (sorted.length === 0) htm += '<div style="color:var(--dim);font-size:12px;text-align:center;padding:30px">No investments added yet. Click + below!</div>';

 

  sorted.forEach(s => {

    const m = M_META[s.market];

    const curPrice = s.livePrice || s.avgPrice;

    const valAED = s.shares * curPrice * FX[m.c];

    const gain = (curPrice - s.avgPrice) * s.shares * FX[m.c];

    const gainPct = s.avgPrice > 0 ? ((curPrice - a.avgPrice)/a.avgPrice)*100 : 0;

    const c24 = s.change24h || 0;

 

    htm += `

      <div class="dsr" onclick="setTab('hold')">

        <div style="display:flex;align-items:center;gap:12px">

          <div class="dsi" style="background:rgba(255,255,255,0.03);color:var(--gold)">${m.f}</div>

          <div>

            <div class="dsname">${s.name}</div>

            <div class="dssub">${s.symbol} • ${s.shares} shares</div>

          </div>

        </div>

        <div>

          <div class="dsval">${formatNum(valAED, 0)} AED</div>

          <div class="dspl ${c24 >= 0 ? 'green' : 'red'}">${c24 >= 0 ? '▲' : '▼'} ${Math.abs(c24).toFixed(2)}%</div>

        </div>

      </div>`;

  });

 

  el.innerHTML = htm;

}

 

function renderHold(el) {

  if (H.length === 0) {

    el.innerHTML = '<div style="color:var(--dim);font-size:12px;text-align:center;padding:40px">No assets found.</div>';

    return;

  }

 

  H.forEach(h => {

    const m = M_META[h.market];

    const curPrice = h.livePrice || h.avgPrice;

    const curValLocal = h.shares * curPrice;

    const curValAED = curValLocal * FX[m.c];

    const costLocal = h.shares * h.avgPrice;

    const plLocal = curValLocal - costLocal;

    const plAED = plLocal * FX[m.c];

    const plPct = h.avgPrice > 0 ? (plLocal / costLocal) * 100 : 0;

   

    // Target computation

    const actPct = totValueAED > 0 ? (curValAED / totValueAED) * 100 : 0;

    const tgPct = h.targetPct || 0;

    const tFill = Math.min(100, tgPct > 0 ? (actPct / tgPct) * 100 : 0);

 

    el.innerHTML += `

      <div class="card">

        <div class="card-top">

          <span class="mbadge" style="color:var(--gold);border-color:rgba(212,168,71,0.3)">${m.f} ${h.market}</span>

          <div class="acts">

            <button class="ibtn" onclick="editHold('${h.id}')">✏️</button>

            <button class="ibtn" style="color:var(--red)" onclick="delHold('${h.id}')">🗑️</button>

          </div>

        </div>

        

        <div class="cmid">

          <div>

            <div class="hn">${h.name}</div>

            <div class="hsb">${h.symbol}</div>

          </div>

          <div>

            <div class="hv">${formatNum(curValAED, 0)} AED</div>

            <div class="ha">${formatNum(curValLocal, 2)} ${m.c}</div>

          </div>

        </div>

 

        <div class="plbox">

          <div>

            <div class="plm ${plAED >= 0 ? 'green' : 'red'}">${plAED >= 0 ? '+' : ''}${formatNum(plAED, 2)} AED</div>

            <div class="pla">${formatNum(plLocal, 2)} ${m.c} Profit</div>

          </div>

          <div class="plp ${plAED >= 0 ? 'green' : 'red'}">${plAED >= 0 ? '▲' : '▼'} ${Math.abs(plPct).toFixed(2)}%</div>

        </div>

 

        <div class="irow">

          <div class="ibox">

            <div class="ilbl">Avg Cost</div>

            <div class="ival">${formatNum(h.avgPrice, 2)} ${m.c}</div>

          </div>

          <div class="ibox">

            <div class="ilbl">Live Price</div>

            <div class="ival">${formatNum(curPrice, 2)} ${m.c} ${h.livePrice ? '<span class="lbadge">LIVE</span>' : ''}</div>

          </div>

        </div>

 

        <div class="twrap">

          <div style="display:flex;justify-content:space-between;font-size:10px">

            <span style="color:var(--muted)">Allocation Deviation</span>

            <span style="color:var(--text)">${actPct.toFixed(1)}% / <span style="color:var(--gold)">${tgPct}% Target</span></span>

          </div>

          <div class="tbg"><div class="tfill" style="width:${tFill}%;background:${tFill > 100 ? 'var(--red)' : 'var(--gold)'}"></div></div>

        </div>

 

        <div class="sgrid">

          <div class="sbox"><div class="slbl">Shares</div><div class="sval">${h.shares}</div></div>

          <div class="sbox"><div class="slbl">24h Chg</div><div class="sval ${h.change24h >= 0 ? 'green' : 'red'}">${h.change24h ? (h.change24h >= 0 ? '+' : '') + h.change24h.toFixed(2) + '%' : '—'}</div></div>

          <div class="sbox"><div class="slbl">Total Cost</div><div class="sval">${formatNum(costLocal, 0)} ${m.c}</div></div>

        </div>

      </div>`;

  });

}

 

function renderMkt(el) {

  const mkts = ['DFM', 'ADX', 'International', 'India', 'Crypto'];

 

  mkts.forEach(mk => {

    const m = M_META[mk];

    const valAED = mAlloc[mk];

    let costAED = 0, dayChg = 0;

   

    H.filter(h => h.market === mk).forEach(h => {

      const fx = FX[m.c] || 1;

      costAED += h.shares * h.avgPrice * fx;

      if (h.change24h) {

        const val = h.shares * (h.livePrice || h.avgPrice) * fx;

        const p = h.change24h / 100;

        dayChg += (val * p) / (1 + p);

      }

    });

 

    const pl = valAED - costAED;

    const plPct = costAED > 0 ? (pl / costAED) * 100 : 0;

 

    el.innerHTML += `

      <div class="mkt-total" style="margin-bottom:16px">

        <div>

          <div class="mkt-total-label">${m.f} ${mk} Allocation</div>

          <div class="mkt-total-val">${formatNum(valAED, 0)} AED</div>

          <div class="mkt-total-invested">Invested: ${formatNum(costAED, 0)} AED</div>

        </div>

        <div class="mkt-total-pl">

          <div class="mkt-total-pl-val ${pl >= 0 ? 'green' : 'red'}">${pl >= 0 ? '+' : ''}${formatNum(pl, 0)} AED</div>

          <div class="mkt-total-pl-pct ${pl >= 0 ? 'green' : 'red'}">${plPct.toFixed(2)}% Tot</div>

        </div>

      </div>`;

  });

}

 

// Modal Interactivity Handlers

function openModal() {

  editId = null;

  selStock = null;

  document.getElementById('mtitle').textContent = 'Add Asset';

  document.getElementById('si').value = '';

  document.getElementById('fsh').value = '';

  document.getElementById('fpr').value = '';

  document.getElementById('fcn').value = '';

  document.getElementById('ftg').value = '';

  document.getElementById('sres').style.display = 'none';

 

  document.getElementById('overlay').classList.add('on');

  document.getElementById('modal').classList.add('on');

}

 

function closeModal() {

  document.getElementById('overlay').classList.remove('on');

  document.getElementById('modal').classList.remove('on');

}

 

function chPill(el) {

  document.querySelectorAll('#mktpills .pill').forEach(p => p.classList.remove('on'));

  el.classList.add('on');

  document.getElementById('si').value = '';

  document.getElementById('sres').style.display = 'none';

  selStock = null;

}

 

function doSearch(val) {

  const resDiv = document.getElementById('sres');

  if (!val || val.length < 1) { resDiv.style.display = 'none'; return; }

 

  const mkt = document.querySelector('#mktpills .pill.on').getAttribute('data-v');

  const items = DB[mkt] || [];

  const filt = items.filter(i => i.name.toLowerCase().includes(val.toLowerCase()) || i.symbol.toLowerCase().includes(val.toLowerCase()));

 

  if (filt.length === 0) {

   resDiv.innerHTML = `<div class="res-item" onclick="selCustom('${val}')"><div><strong>Use Custom Ticker:</strong> "${val.toUpperCase()}"</div> <span>+</span></div>`;

  } else {

    resDiv.innerHTML = '';

    filt.forEach(f => {

      resDiv.innerHTML += `

        <div class="res-item" onclick='selMatch(${JSON.stringify(f)})'>

          <div><strong>${f.symbol}</strong> - ${f.name}</div>

          <span style="color:var(--gold)">➔</span>

        </div>`;

    });

  }

  resDiv.style.display = 'block';

}

 

function selMatch(obj) {

  selStock = obj;

  document.getElementById('si').value = `${obj.symbol} (${obj.name})`;

  document.getElementById('sres').style.display = 'none';

}

 

function selCustom(ticker) {

  selStock = { symbol: ticker.toUpperCase(), name: ticker.toUpperCase() };

  document.getElementById('si').value = ticker.toUpperCase();

  document.getElementById('sres').style.display = 'none';

}

 

function saveH() {

  const mkt = document.querySelector('#mktpills .pill.on').getAttribute('data-v');

  const shares = parseFloat(document.getElementById('fsh').value);

  const avgPr = parseFloat(document.getElementById('fpr').value);

  const customName = document.getElementById('fcn').value.trim();

  const target = parseInt(document.getElementById('ftg').value) || 0;

 

  if (!selStock || isNaN(shares) || isNaN(avgPr)) {

    toast('Please fill out Ticker, Shares, and Price', 'error');

    return;

  }

 

  if (editId) {

    H = H.map(h => h.id === editId ? { ...h, market:mkt, symbol:selStock.symbol, name:customName || selStock.name, shares, avgPrice:avgPr, targetPct:target } : h);

  } else {

    H.push({

      id: Date.now().toString(),

      market: mkt,

      symbol: selStock.symbol,

      name: customName || selStock.name,

      shares,

      avgPrice: avgPr,

      livePrice: avgPr,

      change24h: 0,

      targetPct: target

    });

  }

 

  sv();

  closeModal();

  refreshPrices(false);

  toast('Holding saved perfectly');

}

 

function editHold(id) {

  const h = H.find(item => item.id === id);

  if (!h) return;

 

 editId = id;

  selStock = { symbol: h.symbol, name: h.name };

 

  document.getElementById('mtitle').textContent = 'Edit Asset';

  document.getElementById('si').value = h.symbol;

  document.getElementById('fsh').value = h.shares;

  document.getElementById('fpr').value = h.avgPrice;

  document.getElementById('fcn').value = h.name;

  document.getElementById('ftg').value = h.targetPct || '';

 

  document.querySelectorAll('#mktpills .pill').forEach(p => {

    p.classList.toggle('on', p.getAttribute('data-v') === h.market);

  });

 

  document.getElementById('overlay').classList.add('on');

  document.getElementById('modal').classList.add('on');

}

 

function delHold(id) {

  if (confirm('Are you sure you want to remove this transaction asset position?')) {

    H = H.filter(h => h.id !== id);

    sv();

    calcTotals();

    render();

    toast('Position removed');

  }

}

 

function bindUI() {

  document.getElementById('overlay').onclick = closeModal;

  document.getElementById('bcan').onclick = closeModal;

  document.getElementById('bsave').onclick = saveH;

  document.getElementById('si').oninput = function() { doSearch(this.value); };

}

 

function formatNum(n, d) {

  if (isNaN(n) || n === null) return '0';

  return n.toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d });

}

 

function toast(msg, type='success') {

  const e = document.getElementById('toast');

  e.textContent = msg;

  e.style.background = type === 'error' ? 'var(--red)' : 'var(--green)';

  e.style.color = '#1A1410';

  e.classList.add('on');

  setTimeout(() => e.classList.remove('on'), 2500);

}

</script>
